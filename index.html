<!DOCTYPE html>
<html lang="km">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ប្រព័ន្ធត្រួតពិនិត្យអតិថិជនឆ្លងប្រព័ន្ធ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Khmer:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap');
  :root{
    --primary:#2563eb; --danger:#dc2626; --warn:#f59e0b; --ok:#16a34a;
    --bg:#f4f6f9; --card:#ffffff; --border:#e2e8f0; --text:#1e293b; --muted:#64748b;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Noto Sans Khmer','Noto Sans SC',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);}
  .wrap{max-width:900px;margin:0 auto;padding:24px 16px 60px;}
  header{text-align:center;margin-bottom:16px;}
  header h1{font-size:22px;margin:0 0 4px;}
  header p{color:var(--muted);font-size:13px;margin:0;}
  .langBar{display:flex;justify-content:center;gap:6px;margin-bottom:18px;}
  .langBtn{padding:5px 14px;border-radius:999px;border:1px solid var(--border);background:#fff;font-size:12px;cursor:pointer;color:var(--muted);}
  .langBtn.active{background:var(--primary);color:#fff;border-color:var(--primary);font-weight:600;}
  .searchCard{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.05);}
  .searchRow{display:flex;gap:10px;flex-wrap:wrap;}
  .searchRow input{flex:1;min-width:140px;padding:11px 14px;border:1px solid var(--border);border-radius:8px;font-size:15px;font-family:inherit;}
  .searchRow button{padding:11px 24px;background:var(--primary);color:#fff;border:none;border-radius:8px;font-size:15px;cursor:pointer;font-weight:600;font-family:inherit;}
  .searchRow button:hover{background:#1d4ed8;}
  .searchRow button:disabled{background:#94a3b8;cursor:not-allowed;}
  .hint{color:var(--muted);font-size:12px;margin-top:8px;}
  #result{margin-top:20px;}
  .banner{border-radius:10px;padding:16px 18px;margin-bottom:16px;font-weight:600;font-size:15px;display:none;}
  .banner.risk{background:#fef2f2;border:1.5px solid var(--danger);color:var(--danger);display:block;}
  .banner.safe{background:#f0fdf4;border:1.5px solid var(--ok);color:var(--ok);display:block;}
  .banner.caution{background:#fffbeb;border:1.5px solid var(--warn);color:#b45309;display:block;}
  .banner.blacklist{background:#7f1d1d;border:2px solid #450a0a;color:#fff;display:block;font-size:17px;animation:pulseAlert 1.2s infinite;}
  @keyframes pulseAlert{0%,100%{box-shadow:0 0 0 0 rgba(127,29,29,.6);}50%{box-shadow:0 0 0 8px rgba(127,29,29,0);}}
  .sysCard{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px 18px;margin-bottom:14px;}
  .sysCard h3{margin:0 0 10px;font-size:15px;display:flex;align-items:center;gap:8px;}
  .badge{display:inline-block;font-size:12px;padding:2px 8px;border-radius:999px;font-weight:600;}
  .badge.active{background:#fee2e2;color:var(--danger);}
  .badge.clear{background:#f1f5f9;color:var(--muted);}
  .badge.blacklist{background:#7f1d1d;color:#fff;}
  table{width:100%;border-collapse:collapse;font-size:13px;}
  th,td{text-align:left;padding:7px 6px;border-bottom:1px solid var(--border);}
  th{color:var(--muted);font-weight:600;font-size:12px;}
  .status-pill{padding:2px 8px;border-radius:999px;font-size:11px;font-weight:600;white-space:nowrap;}
  .status-active{background:#fef3c7;color:#b45309;}
  .status-clear{background:#dcfce7;color:#15803d;}
  .status-blacklist{background:#7f1d1d;color:#fff;}
  .status-normal{background:#e2e8f0;color:var(--muted);}
  tr.row-blacklist{background:#fef2f2;}
  .matchtype{font-size:11px;color:var(--muted);}
  .empty{color:var(--muted);font-size:13px;padding:6px 0;}
  .unavailable{color:var(--warn);font-size:12px;}
  footer{text-align:center;color:var(--muted);font-size:11px;margin-top:30px;}
</style>
</head>
<body>
<div class="wrap">
  <div class="langBar" id="langBar"></div>
  <header>
    <h1 id="hTitle"></h1>
    <p id="hSubtitle"></p>
  </header>

  <div class="searchCard">
    <div class="searchRow">
      <input id="qName" type="text">
      <input id="qPhone" type="text">
      <input id="qId" type="text">
      <button id="btnSearch" onclick="doSearch()"></button>
    </div>
    <div class="hint" id="hintText"></div>
  </div>

  <div id="result"></div>

  <footer id="footerText"></footer>
</div>

const SRC_STATUS_KEY = { '进行中':'srcActive', '已结清':'srcSettled', '提前结清':'srcEarlySettled', '逾期':'srcOverdue' };

let curLang = localStorage.getItem('cq_lang') || 'km';
function t(key){ return (I18N[curLang] && I18N[curLang][key]) || I18N.km[key] || key; }
function translateSrcStatus(raw){
  const k = SRC_STATUS_KEY[raw];
  return k ? t(k) : (raw || '');
}

function setLang(lang){
  curLang = lang;
  localStorage.setItem('cq_lang', lang);
  document.documentElement.lang = lang;
  renderChrome();
  const resultEl = document.getElementById('result');
  if (resultEl.dataset.hasData === '1' && window._lastData) render(window._lastData);
}

function renderChrome(){
  document.getElementById('hTitle').textContent = t('title');
  document.getElementById('hSubtitle').textContent = t('subtitle');
  document.getElementById('qName').placeholder = t('phName');
  document.getElementById('qPhone').placeholder = t('phPhone');
  document.getElementById('qId').placeholder = t('phId');
  document.getElementById('btnSearch').textContent = t('btnSearch');
  document.getElementById('hintText').textContent = t('hint');
  document.getElementById('footerText').textContent = t('footer');
  const bar = document.getElementById('langBar');
  bar.innerHTML = LANGS.map(l => `<button class="langBtn ${l===curLang?'active':''}" onclick="setLang('${l}')">${LANG_NAMES[l]}</button>`).join('');
}

async function doSearch(){
  const name = document.getElementById('qName').value.trim();
  const phone = document.getElementById('qPhone').value.trim();
  const idNumber = document.getElementById('qId').value.trim();
  const btn = document.getElementById('btnSearch');
  const resultEl = document.getElementById('result');
  if(!name && !phone && !idNumber){
    resultEl.innerHTML = `<div class="banner risk" style="display:block">${esc(t('errNoInput'))}</div>`;
    return;
  }
  btn.disabled = true; btn.textContent = t('btnSearching');
  resultEl.innerHTML = `<div class="empty">${esc(t('btnSearching'))}</div>`;
  try{
    const params = new URLSearchParams();
    if(name) params.set('name', name);
    if(phone) params.set('phone', phone);
    if(idNumber) params.set('idNumber', idNumber);
    const res = await fetch(`${API_BASE}/api/check?${params.toString()}`);
    const data = await res.json();
    if(!data.ok){ resultEl.innerHTML = `<div class="banner risk" style="display:block">${esc(t('errFail'))}${esc(data.error||'')}</div>`; return; }
    window._lastData = data;
    resultEl.dataset.hasData = '1';
    render(data);
  }catch(e){
    resultEl.innerHTML = `<div class="banner risk" style="display:block">${esc(t('errFail'))}${esc(e.message)}</div>`;
  }finally{
    btn.disabled = false; btn.textContent = t('btnSearch');
  }
}

function esc(s){
  return (s===undefined||s===null?'':String(s)).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function render(data){
  const resultEl = document.getElementById('result');
  let html = '';

  if(data.blacklistRisk){
    html += `<div class="banner blacklist">${esc(t('bannerBlacklist'))}</div>`;
  }

  if(data.crossRisk){
    html += `<div class="banner risk">${esc(t('bannerCrossRisk'))}</div>`;
  } else if(data.morodok.hasActive || data.pawn.hasActive){
    html += `<div class="banner caution">${esc(t('bannerOneActive'))}</div>`;
  } else if(!data.blacklistRisk && data.morodok.matches.length===0 && data.pawn.matches.length===0 && data.legacy.matches.length===0){
    html += `<div class="banner safe">${esc(t('bannerNone'))}</div>`;
  } else if(!data.blacklistRisk){
    html += `<div class="banner safe">${esc(t('bannerClear'))}</div>`;
  }

  html += renderSysCard(t('sysMorodok'), data.morodok);
  html += renderSysCard(t('sysPawn'), data.pawn);
  html += renderLegacyCard(data.legacy);

  resultEl.innerHTML = html;
}

function renderSysCard(title, sys){
  let inner = '';
  if(!sys.available){
    inner = `<div class="unavailable">${esc(t('unavailable'))}</div>`;
  } else if(sys.matches.length===0){
    inner = `<div class="empty">${esc(t('empty'))}</div>`;
  } else {
    inner = `<table><thead><tr>
      <th>${esc(t('thCustomer'))}</th><th>${esc(t('thPhone'))}</th><th>${esc(t('thStatus'))}</th><th>${esc(t('thAmount'))}</th><th>${esc(t('thDate'))}</th><th>${esc(t('thModelShop'))}</th><th>${esc(t('thMatch'))}</th>
    </tr></thead><tbody>`;
    sys.matches.forEach(m => {
      const label = translateSrcStatus(m.status) || m.status || (m.active ? t('srcActive') : t('srcSettled'));
      const pill = m.active ? `<span class="status-pill status-active">${esc(label)}</span>` : `<span class="status-pill status-clear">${esc(label)}</span>`;
      const matchLabel = m.matchType==='phone'?t('matchPhone'):m.matchType==='id'?t('matchId'):t('matchName');
      inner += `<tr>
        <td>${esc(m.customer)}</td>
        <td>${esc(m.phone)}${m.idNumber?`<br><span class="matchtype">${esc(t('thIdNumber'))}:${esc(m.idNumber)}</span>`:''}</td>
        <td>${pill}</td>
        <td>$${esc(m.amount)}</td>
        <td>${esc(m.date)}</td>
        <td>${esc(m.model)} ${esc(m.shop)}</td>
        <td class="matchtype">${matchLabel}</td>
      </tr>`;
    });
    inner += '</tbody></table>';
  }
  const badge = !sys.available ? '' : (sys.hasActive ? `<span class="badge active">${esc(t('badgeActive'))}</span>` : `<span class="badge clear">${esc(t('badgeClear'))}</span>`);
  return `<div class="sysCard"><h3>${esc(title)} ${badge}</h3>${inner}</div>`;
}

function renderLegacyCard(legacy){
  let inner = '';
  const title = t('legacyLabel').replace('{count}', legacy.count ?? '');
  const hasBlacklistMatch = (legacy.matches||[]).some(m => m.isBlacklist);
  if(!legacy.available){
    inner = `<div class="unavailable">${esc(t('legacyUnavailable'))}</div>`;
  } else if(legacy.matches.length===0){
    inner = `<div class="empty">${esc(t('empty'))}</div>`;
  } else {
    inner = `<table><thead><tr><th>${esc(t('thName'))}</th><th>${esc(t('thIdNumber'))}</th><th>${esc(t('thGender'))}</th><th>${esc(t('thHistStatus'))}</th><th>${esc(t('thMatch'))}</th></tr></thead><tbody>`;
    legacy.matches.forEach(m => {
      const rowCls = m.isBlacklist ? 'row-blacklist' : '';
      const pillCls = m.isBlacklist ? 'status-blacklist' : 'status-normal';
      const label = m.isBlacklist ? t('blacklistYes') : t('blacklistNo');
      const matchLabel = m.matchType==='id'?t('matchId'):t('matchName');
      inner += `<tr class="${rowCls}">
        <td>${esc(m.customer)}</td>
        <td>${esc(m.idNumber)}</td>
        <td>${esc(m.gender)}</td>
        <td><span class="status-pill ${pillCls}">${esc(label)}</span></td>
        <td class="matchtype">${matchLabel}</td>
      </tr>`;
    });
    inner += '</tbody></table>';
  }
  const badge = hasBlacklistMatch ? `<span class="badge blacklist">${esc(t('badgeBlacklist'))}</span>` : '';
  return `<div class="sysCard"><h3>${esc(title)} ${badge}</h3>${inner}</div>`;
}

document.addEventListener('DOMContentLoaded', () => {
  renderChrome();
  ['qName','qPhone','qId'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', e => { if(e.key==='Enter') doSearch(); });
  });
});
</script>
