function renderFinanceSummary(){
  const loans=DB_get('loans')||[];
  const pays=DB_get('payments')||[];
  const expenses=DB_get('expenses')||[];
  const td=today(); const m=td.slice(0,7);

  // 基础数据
  const activeLoans=loans.filter(l=>l.status===_lang==='km'?'កំពុងដំណើរ':_lang==='en'?'Active':'进行中');
  const totalInLoan=activeLoans.reduce((a,l)=>a+(+l.loanAmount||0),0);
  const totalDisbursed=loans.reduce((a,l)=>a+(+l.loanAmount||0),0);
  const totalInterestCollected=pays.reduce((a,p)=>a+(+p.paidInterest||0),0);

  // 本月应收利息 = 所有进行中合同月利息总和
  const monthlyReceivable=activeLoans.reduce((a,l)=>a+(+l.monthlyInterest||0),0);

  // 本月日常开支
  const monthlyExp=expenses.filter(e=>e.date.slice(0,7)===m).reduce((a,e)=>a+(+e.amount||0),0);

  // 本月毛利润
  const monthlyProfit=monthlyReceivable-monthlyExp;

  // 坏账率3档
  function getOverdueDays(l){
    let max=0;
    (l.schedule||[]).forEach(p=>{if(!p.paid&&p.dueDate<td){const d=daysDiff(p.dueDate,td);if(d>max)max=d;}});
    return max;
  }
  const watch=activeLoans.filter(l=>{const d=getOverdueDays(l);return d>=1&&d<=30;});
  const subStd=activeLoans.filter(l=>{const d=getOverdueDays(l);return d>=31&&d<=60;});
  const doubtful=activeLoans.filter(l=>{const d=getOverdueDays(l);return d>=61&&d<=90;});
  const loss=activeLoans.filter(l=>getOverdueDays(l)>90);

  const watchAmt=watch.reduce((a,l)=>a+(+l.loanAmount||0),0);
  const subStdAmt=subStd.reduce((a,l)=>a+(+l.loanAmount||0),0);
  const doubtfulAmt=doubtful.reduce((a,l)=>a+(+l.loanAmount||0),0);
  const lossAmt=loss.reduce((a,l)=>a+(+l.loanAmount||0),0);

  const watchRate=totalInLoan>0?((watchAmt/totalInLoan)*100).toFixed(1):0;
  const subStdRate=totalInLoan>0?((subStdAmt/totalInLoan)*100).toFixed(1):0;
  const lossRate=totalInLoan>0?((lossAmt/totalInLoan)*100).toFixed(1):0;

  // 全部合同统计
  const normalCount=loans.filter(l=>!l.interestType||l.interestType==='normal').length;
  const reducedCount=loans.filter(l=>l.interestType==='reduced').length;
  const referralCount=loans.filter(l=>l.interestType==='referral').length;

  return `
  <div class="card" style="background:linear-gradient(135deg,#0d3b6e,#1565c0);color:#fff;margin-bottom:14px">
    <div style="font-size:13px;color:rgba(255,255,255,.6);margin-bottom:14px;font-weight:700">📊 总账概览 — 全部合同（正常+降息+转介绍）</div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:14px;text-align:center">
      <div style="background:rgba(255,255,255,.1);border-radius:10px;padding:12px">
        <div style="font-size:11px;color:rgba(255,255,255,.6)">在贷总额</div>
        <div style="font-size:22px;font-weight:700;margin:4px 0">${fmt(totalInLoan)}</div>
        <div style="font-size:11px;color:rgba(255,255,255,.5)">${activeLoans.length} 笔进行中</div>
      </div>
      <div style="background:rgba(255,255,255,.1);border-radius:10px;padding:12px">
        <div style="font-size:11px;color:rgba(255,255,255,.6)">累计放款</div>
        <div style="font-size:22px;font-weight:700;margin:4px 0">${fmt(totalDisbursed)}</div>
        <div style="font-size:11px;color:rgba(255,255,255,.5)">${loans.length} 笔历史合同</div>
      </div>
      <div style="background:rgba(255,255,255,.1);border-radius:10px;padding:12px">
        <div style="font-size:11px;color:rgba(255,255,255,.6)">累计收息</div>
        <div style="font-size:22px;font-weight:700;margin:4px 0">${fmt(totalInterestCollected)}</div>
        <div style="font-size:11px;color:rgba(255,255,255,.5)">历史全部</div>
      </div>
    </div>
  </div>

  <div class="stats-grid" style="margin-bottom:14px">
    <div class="stat-card green"><span class="stat-icon">💰</span><div class="stat-label">本月应收利息</div><div class="stat-value">${fmt(monthlyReceivable)}</div><div class="stat-sub">进行中合同月息合计</div></div>
    <div class="stat-card red"><span class="stat-icon">🧾</span><div class="stat-label">本月日常开支</div><div class="stat-value">${fmt(monthlyExp)}</div></div>
    <div class="stat-card ${monthlyProfit>=0?'green':'red'}"><span class="stat-icon">📈</span><div class="stat-label">本月毛利润</div><div class="stat-value" style="color:${monthlyProfit>=0?'var(--green)':'var(--red)'}">${fmt(monthlyProfit)}</div><div class="stat-sub">应收利息 − 开支</div></div>
    <div class="stat-card blue"><span class="stat-icon">📋</span><div class="stat-label">合同结构</div><div class="stat-value" style="font-size:14px">${normalCount}/${reducedCount}/${referralCount}</div><div class="stat-sub">正常/降息/转介绍</div></div>
  </div>

  <div class="card">
    <div class="card-title" style="margin-bottom:14px">⚠️ 风险分析（基于在贷总额 ${fmt(totalInLoan)}）</div>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:12px">
      <div style="background:#fff8e1;border-radius:10px;padding:12px;text-align:center;border-left:3px solid #f9a825">
        <div style="font-size:11px;color:#f9a825;font-weight:700">🟡 关注（1-30天）</div>
        <div style="font-size:20px;font-weight:700;color:#f9a825;margin:6px 0">${watch.length}笔</div>
        <div style="font-size:13px;font-weight:700">${fmt(watchAmt)}</div>
        <div style="font-size:11px;color:var(--muted)">占比 ${watchRate}%</div>
      </div>
      <div style="background:#fff3e0;border-radius:10px;padding:12px;text-align:center;border-left:3px solid #ef6c00">
        <div style="font-size:11px;color:#ef6c00;font-weight:700">🟠 次级（31-60天）</div>
        <div style="font-size:20px;font-weight:700;color:#ef6c00;margin:6px 0">${subStd.length}笔</div>
        <div style="font-size:13px;font-weight:700">${fmt(subStdAmt)}</div>
        <div style="font-size:11px;color:var(--muted)">占比 ${subStdRate}%</div>
      </div>
      <div style="background:#ffebee;border-radius:10px;padding:12px;text-align:center;border-left:3px solid #c62828">
        <div style="font-size:11px;color:#c62828;font-weight:700">🔴 可疑（61-90天）</div>
        <div style="font-size:20px;font-weight:700;color:#c62828;margin:6px 0">${doubtful.length}笔</div>
        <div style="font-size:13px;font-weight:700">${fmt(doubtfulAmt)}</div>
        <div style="font-size:11px;color:var(--muted)">占比 ${totalInLoan>0?((doubtfulAmt/totalInLoan)*100).toFixed(1):0}%</div>
      </div>
      <div style="background:#f3e5f5;border-radius:10px;padding:12px;text-align:center;border-left:3px solid #7b1fa2">
        <div style="font-size:11px;color:#7b1fa2;font-weight:700">🟣 坏账（90天+）</div>
        <div style="font-size:20px;font-weight:700;color:#7b1fa2;margin:6px 0">${loss.length}笔</div>
        <div style="font-size:13px;font-weight:700">${fmt(lossAmt)}</div>
        <div style="font-size:11px;color:var(--muted)">坏账率 ${lossRate}%</div>
      </div>
    </div>
  </div>`;
}

function renderFinancePerformance(){
  const loans=DB_get('loans')||[];
  const pays=DB_get('payments')||[];
  const td=today(); const m=td.slice(0,7);

  // 按录单客服统计
  const staffMap={};
  loans.forEach(l=>{
    const key=l.createdByName||l.createdBy||'未知';
    if(!staffMap[key]) staffMap[key]={name:key,total:0,amt:0,active:0,activeAmt:0,interest:0,mAmt:0,mCount:0};
    staffMap[key].total++;
    staffMap[key].amt+=(+l.loanAmount||0);
    if(l.status===_lang==='km'?'កំពុងដំណើរ':_lang==='en'?'Active':'进行中'){staffMap[key].active++;staffMap[key].activeAmt+=(+l.loanAmount||0);}
    if(l.date.slice(0,7)===m){staffMap[key].mCount++;staffMap[key].mAmt+=(+l.loanAmount||0);}
  });
  // 收息统计
  pays.forEach(p=>{
    const loan=loans.find(l=>l.id===p.loanId);
    if(!loan) return;
    const key=loan.createdByName||loan.createdBy||'未知';
    if(staffMap[key]) staffMap[key].interest+=(+p.paidInterest||0);
  });

  const ranking=Object.values(staffMap).sort((a,b)=>b.amt-a.amt);

  return `
  <div class="stats-grid" style="margin-bottom:14px">
    <div class="stat-card blue"><span class="stat-icon">👤</span><div class="stat-label">客服人数</div><div class="stat-value">${ranking.length}</div></div>
    <div class="stat-card green"><span class="stat-icon">📋</span><div class="stat-label">本月新增</div><div class="stat-value">${loans.filter(l=>l.date.slice(0,7)===m).length}</div><div class="stat-sub">${fmt(loans.filter(l=>l.date.slice(0,7)===m).reduce((a,l)=>a+(+l.loanAmount||0),0))}</div></div>
    <div class="stat-card amber"><span class="stat-icon">💰</span><div class="stat-label">累计放款</div><div class="stat-value">${fmt(loans.reduce((a,l)=>a+(+l.loanAmount||0),0))}</div></div>
    <div class="stat-card green"><span class="stat-icon">💵</span><div class="stat-label">累计收息</div><div class="stat-value">${fmt(pays.reduce((a,p)=>a+(+p.paidInterest||0),0))}</div></div>
  </div>
  <div class="card">
    <div class="card-title" style="margin-bottom:12px">🏆 客服业绩排行榜</div>
    ${ranking.length?`<div class="table-wrap"><table>
      <tr><th>排名</th><th>客服姓名</th><th>总合同数</th><th>本月新增</th><th>总放款额</th><th>在贷笔数</th><th>在贷金额</th><th>累计收息</th></tr>
      ${ranking.map((s,i)=>`<tr>
        <td><span style="background:${i===0?'#ffd700':i===1?'#c0c0c0':i===2?'#cd7f32':'#e0e0e0'};color:${i<3?'#333':'#555'};border-radius:50%;width:24px;height:24px;display:inline-flex;align-items:center;justify-content:center;font-weight:700;font-size:12px">${i+1}</span></td>
        <td class="fw700">${esc(s.name)}</td>

function renderFinanceMonthly(){
  const loans=DB_get('loans')||[];
  const pays=DB_get('payments')||[];
  const expenses=DB_get('expenses')||[];

  // 获取所有月份
  const allMonths=new Set([
    ...pays.map(p=>p.date.slice(0,7)),
    ...expenses.map(e=>e.date.slice(0,7)),
    ...loans.map(l=>l.date.slice(0,7))
  ]);
  const months=[...allMonths].sort().reverse();

  // 每月应收利息 = 该月进行中合同的月利息合计
  // 用贷款日期来判断该月有哪些合同在进行中（简化：用所有active合同计算当月应收）
  const activeLoans=loans.filter(l=>l.status===_lang==='km'?'កំពុងដំណើរ':_lang==='en'?'Active':'进行中');
  const currentMonthlyReceivable=activeLoans.reduce((a,l)=>a+(+l.monthlyInterest||0),0);

  const rows=months.map(m=>{
    const mPays=pays.filter(p=>p.date.slice(0,7)===m);
    const actualInterest=mPays.reduce((a,p)=>a+(+p.paidInterest||0),0);
    const mExp=expenses.filter(e=>e.date.slice(0,7)===m).reduce((a,e)=>a+(+e.amount||0),0);
    const mLoans=loans.filter(l=>l.date.slice(0,7)===m);
    const mDisbursed=mLoans.reduce((a,l)=>a+(+l.loanAmount||0),0);
    // 应收利息用实收代替（历史月份无法精确重算）
    const profit=actualInterest-mExp;
    return {m,actualInterest,mExp,profit,mDisbursed,mCount:mLoans.length};
  });

  const totalProfit=rows.reduce((a,r)=>a+r.profit,0);

  return `
  <div class="stats-grid" style="margin-bottom:14px">
    <div class="stat-card green"><span class="stat-icon">💰</span><div class="stat-label">当月应收利息</div><div class="stat-value">${fmt(currentMonthlyReceivable)}</div><div class="stat-sub">进行中合同月息合计</div></div>
    <div class="stat-card blue"><span class="stat-icon">📊</span><div class="stat-label">累计实收利息</div><div class="stat-value">${fmt(pays.reduce((a,p)=>a+(+p.paidInterest||0),0))}</div></div>
    <div class="stat-card red"><span class="stat-icon">🧾</span><div class="stat-label">累计开支</div><div class="stat-value">${fmt(expenses.reduce((a,e)=>a+(+e.amount||0),0))}</div></div>
    <div class="stat-card ${totalProfit>=0?'green':'red'}"><span class="stat-icon">📈</span><div class="stat-label">累计毛利润</div><div class="stat-value" style="color:${totalProfit>=0?'var(--green)':'var(--red)'}">${fmt(totalProfit)}</div></div>
  </div>
  <div class="card">
    <div class="card-title" style="margin-bottom:12px">📅 月度对账单</div>
    <div style="font-size:11px;color:var(--muted);margin-bottom:10px">※ 历史月份利润以实收利息计算；当月应收利息见上方统计卡</div>
    ${rows.length?`<div class="table-wrap"><table>
      <tr><th>月份</th><th>新增合同</th><th>当月放款</th><th>实收利息</th><th>日常开支</th><th>毛利润</th></tr>
      ${rows.map(r=>`<tr>
        <td class="fw700">${r.m}</td>
        <td>${r.mCount} 笔</td>
        <td class="text-amber fw700">${fmt(r.mDisbursed)}</td>
        <td class="text-green fw700">${fmt(r.actualInterest)}</td>
        <td class="text-red">${fmt(r.mExp)}</td>
        <td class="fw700" style="color:${r.profit>=0?'var(--green)':'var(--red)'}">${fmt(r.profit)}</td>
      </tr>`).join('')}
      <tr style="background:#f5f5f5;font-weight:700">
        <td colspan="3">合计</td>
        <td class="text-green fw700">${fmt(rows.reduce((a,r)=>a+r.actualInterest,0))}</td>
        <td class="text-red fw700">${fmt(rows.reduce((a,r)=>a+r.mExp,0))}</td>
        <td class="fw700" style="color:${totalProfit>=0?'var(--green)':'var(--red)'}">${fmt(totalProfit)}</td>
      </tr>
    </table></div>`:`<div class="empty-state"><div class="ei">📅</div><p>暂无数据</p></div>`}
  </div>`;
}

          ${['12','12Pro','12ProMax','13','13Pro','13ProMax','14','14Plus','14Pro','14ProMax','15','15Plus','15Pro','15ProMax','16','16Plus','16Pro','16ProMax','17','17 Air','17 Pro','17 Pro Max'].map(m=>`<option value="iPhone ${m}">iPhone ${m}</option>`).join('')}
          <option value="${t('apptSrcOther')}">${t('apptSrcOther')}</option>
        </select>
      </div>
      <div class="form-group"><label>5. ${t('apptDate')}</label><input type="date" id="apptDate" value="${td}"></div>
      <div class="form-group"><label>${t('apptTime')}</label><input type="time" id="apptTime" value="10:00"></div>
      <div class="form-group"><label>6. ${t('apptStore')}</label><select id="apptStore">${storeOpts}</select></div>
      <div class="form-group"><label>7. ${t('apptStaff')}</label><input id="apptStaff" value="${_currentUser?.name||_currentUser?.username||''}" placeholder="${t('apptStaff')}"></div>

    </div>
    <div id="apptMsg" style="margin-top:10px"></div>
  </div>`:`

  <div class="card">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap">

        <label style="font-size:12px;color:var(--muted)">📅 ${_lang==='km'?'ពី':_lang==='en'?'From':'从'}</label>
        <input type="date" value="${dateFrom}" onchange="window._apptDateFrom=this.value;nav('appointment')" style="font-size:12px;padding:3px 8px;border:1px solid #ddd;border-radius:6px;font-family:inherit">
        <label style="font-size:12px;color:var(--muted)">${_lang==='km'?'ដល់':_lang==='en'?'To':'到'}</label>
        <input type="date" value="${dateTo}" onchange="window._apptDateTo=this.value;nav('appointment')" style="font-size:12px;padding:3px 8px;border:1px solid #ddd;border-radius:6px;font-family:inherit">

          ${[...new Set(appts.map(a=>a.staffName||'').filter(Boolean))].map(s=>`<option value="${esc(s)}" ${(window._apptStaffFilter||'')===s?'selected':''}>${esc(s)}</option>`).join('')}
        </select>
        ${(window._apptDateFrom||window._apptDateTo||window._apptStaffFilter)?'<button onclick="window._apptDateFrom=\'\';window._apptDateTo=\'\';window._apptStaffFilter=\'\';window._apptSearch=\'\';nav(\'appointment\')" style="font-size:11px;padding:3px 8px;border:1px solid #ddd;border-radius:6px;background:#f5f5f5;cursor:pointer;font-family:inherit">'+t('apptClear')+'</button>':''}
        <input id="apptSearch" value="${window._apptSearch||''}" oninput="window._apptSearch=this.value;nav('appointment')" placeholder="${_lang==='km'?'ស្វែងរក...':_lang==='en'?'Search name, location, staff...':'搜索姓名/地点/客服...'}" style="font-size:12px;padding:4px 10px;border:1px solid #1565c0;border-radius:6px;font-family:inherit;width:200px;outline:none">

        }).join('')}
      </div>
    </div>
    ${(()=>{
      const filter=window._apptFilter||'全部';
      const staffFilter=window._apptStaffFilter||'';
      const searchQ=(window._apptSearch||'').toLowerCase().trim();
      let list=filter==='全部'?appts:appts.filter(a=>a.status===filter);
      if(dateFrom) list=list.filter(a=>a.arrivalDate>=dateFrom);
      if(dateTo) list=list.filter(a=>a.arrivalDate<=dateTo);
      if(staffFilter) list=list.filter(a=>(a.staffName||'')===staffFilter);
      if(searchQ) list=list.filter(a=>
        (a.customer||'').toLowerCase().includes(searchQ)||
        (a.store||'').toLowerCase().includes(searchQ)||
        (a.staffName||'').toLowerCase().includes(searchQ)||
        (a.phone||'').includes(searchQ)
      );
      const sorted=list.slice().sort((a,b)=>(a.arrivalDate+a.arrivalTime)<(b.arrivalDate+b.arrivalTime)?1:-1);
      if(!sorted.length) return `<div class="empty-state"><div class="ei">📅</div><p>${t('noRecord')}</p></div>`;
      // 按日期分组
      const dateGroups={};
      sorted.forEach(a=>{ const d=a.arrivalDate||'未知'; if(!dateGroups[d])dateGroups[d]=[]; dateGroups[d].push(a); });
      const sortedDates=Object.keys(dateGroups).sort().reverse();
      const thead=`<tr><th>#</th><th>${_lang==='km'?'អតិថិជន':_lang==='en'?'Customer':'客户'}</th><th>${_lang==='km'?'ទំនាក់ទំនង':_lang==='en'?'Contact':'联系方式'}</th><th>${_lang==='km'?'ប្រភព':_lang==='en'?'Source':'来源'}</th><th>${_lang==='km'?'ម៉ូដែល':_lang==='en'?'Model':'手机型号'}</th><th>${_lang==='km'?'ពេលវេលា':_lang==='en'?'Time':'时间'}</th><th>${_lang==='km'?'ទីតាំង':_lang==='en'?'Location':'地点'}</th><th>${_lang==='km'?'បុគ្គលិក':_lang==='en'?'Staff':'客服'}</th><th>${_lang==='km'?'ស្ថានភាព':_lang==='en'?'Status':'状态'}</th><th>${t('apptFailReason')}</th><th>${_lang==='km'?'សកម្មភាព':_lang==='en'?'Action':'操作'}</th></tr>`;
      return sortedDates.map(date=>{
        const dayList=dateGroups[date];
        const uid='appt_'+date.replace(/-/g,'');
        const statusCount={待到店:0,已到店:0,已成交:0,未成交:0,爽约:0};

        const isOpen=window._apptOpenDays&&window._apptOpenDays.has(uid);
        return `<div class="card" style="margin-bottom:8px;padding:0;overflow:hidden">
          <div onclick="toggleApptDay('${uid}')" style="display:flex;align-items:center;gap:10px;padding:10px 16px;background:#f0f4ff;cursor:pointer;user-select:none;border-bottom:1px solid #e0e0e0;flex-wrap:wrap">
            <span id="${uid}_icon" style="font-size:14px">${isOpen?'▼':'▶'}</span>
            <span style="font-weight:700;color:var(--navy);font-size:14px">📅 ${date}</span>
            <span style="background:var(--navy);color:#fff;border-radius:12px;padding:2px 10px;font-size:12px;font-weight:700">${dayList.length} 条</span>
            ${statusCount['待到店']>0?`<span style="background:#1565c0;color:#fff;border-radius:10px;padding:1px 8px;font-size:11px">待到店 ${statusCount['待到店']}</span>`:''}
            ${statusCount['已到店']>0?`<span style="background:#2e7d32;color:#fff;border-radius:10px;padding:1px 8px;font-size:11px">已到店 ${statusCount['已到店']}</span>`:''}
            ${statusCount['已成交']>0?`<span style="background:#6a1b9a;color:#fff;border-radius:10px;padding:1px 8px;font-size:11px">已成交 ${statusCount['已成交']}</span>`:''}
            ${statusCount['未成交']>0?`<span style="background:#e65100;color:#fff;border-radius:10px;padding:1px 8px;font-size:11px">未成交 ${statusCount['未成交']}</span>`:''}
            ${statusCount['爽约']>0?`<span style="background:#b71c1c;color:#fff;border-radius:10px;padding:1px 8px;font-size:11px">爽约 ${statusCount['爽约']}</span>`:''}
          </div>
          <div id="${uid}" style="overflow:auto;display:${isOpen?'':'none'}">
            <table style="width:100%;border-collapse:collapse">
              ${thead}
              ${dayList.map(a=>`<tr>
                <td style="font-size:12px;color:var(--muted)">${a.id}</td>
                <td class="fw700">${esc(a.customer)}</td>
                <td style="font-size:12px">${esc(a.phone)}</td>
                <td><span class="badge badge-gray" style="font-size:11px">${esc(a.source)}</span></td>
                <td style="font-size:12px">${esc(a.phoneModel||'—')}</td>
                <td style="font-size:12px;white-space:nowrap">${a.arrivalTime||'—'}</td>
                <td style="font-size:12px">${esc(a.store||'—')}</td>
                <td style="font-size:12px">${esc(a.staffName||'—')}</td>
                <td><span style="padding:3px 10px;border-radius:12px;font-size:11px;font-weight:700;background:${statusColor[a.status]||'#aaa'}22;color:${statusColor[a.status]||'#555'};border:1px solid ${statusColor[a.status]||'#aaa'}44">${a.status}</span></td>
                <td style="font-size:12px;color:${a.failReason?'#e65100':'var(--muted)'};max-width:140px">${a.failReason?esc(a.failReason):'—'}</td>
                <td>
                  <div style="display:flex;gap:4px;flex-wrap:wrap">
                    <select onchange="apptStatusChange(${a.id},this.value);this.value=''" style="font-size:11px;padding:3px 6px;border-radius:6px;border:1px solid #ddd;font-family:inherit;cursor:pointer">
                      <option value="">${t('apptUpdateStatus')}</option>
                      <option value="待到店">${t('apptPending')}</option>
                      <option value="已到店">${t('apptArrived')}</option>
                      <option value="已成交">${t('apptConverted')}</option>
                      <option value="未成交">${t('apptFailed')}</option>
                      <option value="爽约">${t('apptNoShow')}</option>
                    </select>
                    ${a.status==='已到店'?`<button class="btn btn-success btn-sm" onclick="apptToLoan(${a.id})">${t('apptTransfer')}</button>`:''}
                    <button class="btn btn-primary btn-sm" onclick="editAppointment(${a.id})">✏️ ${_lang==='km'?'កែប្រែ':_lang==='en'?'Edit':'编辑'}</button>
                    ${isAdmin()||isManager()?`<button class="btn btn-danger btn-sm" onclick="deleteAppointment(${a.id})">${t('apptDelete')}</button>`:''}
                  </div>
                </td>
              </tr>`).join('')}
            </table>
          </div>
        </div>`;
      }).join('');
    })()}
  </div>

  <div id="failReasonModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:600;align-items:center;justify-content:center">
    <div style="background:#fff;border-radius:14px;padding:24px;max-width:400px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,.3)">
      <div style="font-size:16px;font-weight:700;color:var(--navy);margin-bottom:16px">${t('apptFailTitle')}</div>
      <textarea id="failReasonInput" placeholder="${t('apptFailPlaceholder')}" style="width:100%;height:100px;border:1.5px solid #ddd;border-radius:8px;padding:10px;font-size:13px;font-family:inherit;resize:vertical;box-sizing:border-box"></textarea>
      <div style="display:flex;gap:10px;margin-top:14px;justify-content:flex-end">
        <button onclick="cancelFailReason()" class="btn btn-outline">${t('apptCancel')}</button>
        <button onclick="confirmFailReason()" class="btn btn-success">${t('apptConfirm')}</button>
      </div>
    </div>
  </div>`}`;
}

window._apptOpenDays=window._apptOpenDays||new Set();
window.toggleApptDay=function(uid){
  const el=document.getElementById(uid);
  const icon=document.getElementById(uid+'_icon');
  if(!el) return;
  if(el.style.display==='none'){ el.style.display=''; if(icon)icon.textContent='▼'; window._apptOpenDays.add(uid); }
  else { el.style.display='none'; if(icon)icon.textContent='▶'; window._apptOpenDays.delete(uid); }
};
window.submitAppointment=async function(){
  const customer=document.getElementById('apptCust')?.value?.trim();
  const phone=document.getElementById('apptPhone')?.value?.trim();
  const arrivalDate=document.getElementById('apptDate')?.value;
  if(!customer||!phone||!arrivalDate){
    showMsg('apptMsg',_lang==='km'?'សូមបំពេញឈ្មោះ ទំនាក់ទំនង និងកាលបរិច្ឆេទ':_lang==='en'?'Please fill in name, contact and date':'请填写客户姓名、联系方式和到店日期','red');
    return;
  }
  const appts=DB_get('appointments')||[];
  const apptId=await getNextId('appointments');
  const appt={
    id:apptId,customer,phone,
    source:document.getElementById('apptSource')?.value||'',
    phoneModel:document.getElementById('apptModel')?.value?.trim()||'',
    arrivalDate,
    arrivalTime:document.getElementById('apptTime')?.value||'',
    store:document.getElementById('apptStore')?.value||'',
    staffName:document.getElementById('apptStaff')?.value?.trim()||(_currentUser?.name||''),
    note:document.getElementById('apptNote')?.value?.trim()||'',
    status:'待到店',failReason:'',
    createdAt:new Date().toISOString().slice(0,10),
    createdBy:_currentUser?.username||'',
  };
  appts.push(appt);
  DB_set('appointments',appts);
  saveRecord('appointments',appt);
  showMsg('apptMsg',_lang==='km'?'✅ បានរក្សាទុក!':_lang==='en'?'✅ Appointment saved!':'✅ 预约单已保存！','green');
  setTimeout(()=>{window._apptTab='list';nav('appointment');},800);
};

// 编辑预约单

  const a=appts.find(x=>x.id===id);
  if(!a) return;
  const stores=DB_get('stores')||[];
  const storeOpts=stores.length?stores.map(s=>`<option value="${esc(s.name||s)}" ${a.store===(s.name||s)?'selected':''}>${esc(s.name||s)}</option>`).join(''):`<option value="MORODOK总店" ${a.store==='MORODOK总店'?'selected':''}>MORODOK总店</option><option value="A1" ${a.store==='A1'?'selected':''}>A1</option><option value="A2" ${a.store==='A2'?'selected':''}>A2</option>`;
  const sources=['Facebook','TikTok','Instagram','转介绍','自然到店','其他'];
  const modal=document.createElement('div');
  modal.id='editApptModal';
  modal.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:600;display:flex;align-items:center;justify-content:center';
  modal.innerHTML=`
  <div style="background:#fff;border-radius:14px;padding:24px;max-width:560px;width:95%;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div style="font-size:16px;font-weight:700;color:var(--navy)">✏️ 编辑预约单 #${a.id}</div>
      <button onclick="document.getElementById('editApptModal').remove()" style="background:none;border:none;font-size:20px;cursor:pointer;color:#999">✕</button>
    </div>
    <div class="form-grid">
      <div class="form-group"><label>客户姓名 *</label><input id="ea_cust" value="${esc(a.customer||'')}" placeholder="客户全名"></div>
      <div class="form-group"><label>联系方式 *</label><input id="ea_phone" value="${esc(a.phone||'')}" placeholder="电话号码"></div>
      <div class="form-group"><label>来源</label>
        <select id="ea_source">${sources.map(s=>`<option value="${s}" ${a.source===s?'selected':''}>${s}</option>`).join('')}</select>
      </div>
      <div class="form-group"><label>手机型号</label>
        <select id="ea_model" style="width:100%;border:1.5px solid var(--border);border-radius:8px;padding:9px 12px;font-size:13px;font-family:inherit;outline:none">
          <option value="">— 选择型号 —</option>
          ${['12','12Pro','12ProMax','13','13Pro','13ProMax','14','14Plus','14Pro','14ProMax','15','15Plus','15Pro','15ProMax','16','16Plus','16Pro','16ProMax','17','17 Air','17 Pro','17 Pro Max'].map(m=>`<option value="iPhone ${m}" ${a.phoneModel==='iPhone '+m?'selected':''}>iPhone ${m}</option>`).join('')}
          <option value="其他" ${a.phoneModel==='其他'?'selected':''}>其他</option>
        </select>
      </div>
      <div class="form-group"><label>到店日期 *</label><input type="date" id="ea_date" value="${a.arrivalDate||''}"></div>
      <div class="form-group"><label>到店时间</label><input type="time" id="ea_time" value="${a.arrivalTime||''}"></div>
      <div class="form-group"><label>服务地点</label><select id="ea_store">${storeOpts}</select></div>
      <div class="form-group"><label>预约客服</label><input id="ea_staff" value="${esc(a.staffName||'')}" placeholder="客服姓名"></div>
      <div class="form-group span2"><label>备注</label><input id="ea_note" value="${esc(a.note||'')}" placeholder="备注"></div>
    </div>
    <div id="ea_msg" style="margin:10px 0;font-size:13px"></div>
    <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:14px">
      <button onclick="document.getElementById('editApptModal').remove()" class="btn btn-outline">取消</button>
      <button onclick="saveEditAppointment(${a.id})" class="btn btn-success">💾 保存修改</button>

window.saveEditAppointment=function(id){
  const customer=document.getElementById('ea_cust')?.value?.trim();
  const phone=document.getElementById('ea_phone')?.value?.trim();
  const arrivalDate=document.getElementById('ea_date')?.value;
  const msg=document.getElementById('ea_msg');
  if(!customer||!phone||!arrivalDate){
    if(msg){msg.style.color='var(--red)';msg.textContent='请填写客户姓名、联系方式和到店日期';}
    return;
  }
  const appts=DB_get('appointments')||[];
  const idx=appts.findIndex(x=>x.id===id);
  if(idx<0) return;
  appts[idx]={
    ...appts[idx],
    customer,phone,
    source:document.getElementById('ea_source')?.value||appts[idx].source,
    phoneModel:document.getElementById('ea_model')?.value||appts[idx].phoneModel||'',
    arrivalDate,
    arrivalTime:document.getElementById('ea_time')?.value||appts[idx].arrivalTime||'',
    store:document.getElementById('ea_store')?.value||appts[idx].store||'',
    staffName:document.getElementById('ea_staff')?.value?.trim()||appts[idx].staffName||'',
    note:document.getElementById('ea_note')?.value?.trim()||'',
  };
  DB_set('appointments',appts);
  saveRecord('appointments',appts[idx]);
  document.getElementById('editApptModal')?.remove();
  nav('appointment');
};

window._pendingFailId=null;

window.apptStatusChange=function(id,status){
  if(!status) return;
  if(status==='未成交'){
    window._pendingFailId=id;
    const modal=document.getElementById('failReasonModal');
    if(modal){ modal.style.display='flex'; document.getElementById('failReasonInput').value=''; document.getElementById('failReasonInput').focus(); }
    return;
  }
  updateApptStatus(id,status);
};

window.cancelFailReason=function(){
  window._pendingFailId=null;
  const modal=document.getElementById('failReasonModal');
  if(modal) modal.style.display='none';
};

window.confirmFailReason=function(){
  const id=window._pendingFailId;
  const reason=document.getElementById('failReasonInput')?.value?.trim()||'';
  const modal=document.getElementById('failReasonModal');
  if(modal) modal.style.display='none';
  if(!id) return;
  const appts=DB_get('appointments')||[];
  const a=appts.find(x=>x.id===id);
  if(!a) return;
  a.status='未成交'; a.failReason=reason;
  DB_set('appointments',appts); saveRecord('appointments',a); nav('appointment');
};

// 转单：跳到抵押登记，并把预约单状态改为已成交
window.apptToLoan=function(apptId){
  // 记录来源apptId，抵押登记保存成功后自动更新预约单状态
  window._fromApptId=apptId;
  nav('loan-add');
};

window.updateApptStatus=function(id,status){
  if(!status) return;
  const appts=DB_get('appointments')||[];
  const a=appts.find(x=>x.id===id);
  if(!a) return;
  a.status=status;
  DB_set('appointments',appts);
  saveRecord('appointments',a);
  nav('appointment');
};

window.deleteAppointment=function(id){
  if(!confirm('确定删除这条预约记录？')) return;
  const appts=(DB_get('appointments')||[]).filter(a=>a.id!==id);
  DB_set('appointments',appts);
  fetch('/api/delete-record',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({table:'appointments',id})});
  nav('appointment');
};

function renderOverdue(){
  const loans=DB_get('loans')||[];
  const td=today();
  const items=[];
  loans.filter(l=>l.status===_lang==='km'?'កំពុងដំណើរ':_lang==='en'?'Active':'进行中').forEach(l=>{
    l.schedule.filter(p=>!p.paid&&p.dueDate<td).forEach(p=>{
      items.push({l,p,days:daysDiff(p.dueDate,td)});
    });
  });
  items.sort((a,b)=>b.days-a.days);
  return `
  <div class="page-header"><div class="page-title">🚨 ${t('overdueTitle')}</div></div>

function renderTomorrow(){

window.submitExpense=async function(){
  const amount=+(document.getElementById('exAmt')?.value||0);
  if(!amount){showMsg('exMsg',t('msgFillAmount'),'red');return;}
  const expenses=DB_get('expenses')||[];
  const expId=await getNextId('expenses');
  const exp={id:expId,date:document.getElementById('exDate')?.value||today(),
    cat:document.getElementById('exCat')?.value||'',amount,
    note:document.getElementById('exNote')?.value||''};
  expenses.push(exp);
  DB_set('expenses',expenses);
  saveRecord('expenses',exp);
  document.getElementById('exAmt').value=''; document.getElementById('exNote').value='';
  showMsg('exMsg','✅ '+t('saved'),'green');
  nav('expenses');
};
window.deleteExpense=function(id){
  if(!confirm(t('deleteBtn')+'?')) return;
  DB_set('expenses',(DB_get('expenses')||[]).filter(e=>e.id!==id));
  fetch('/api/delete-record',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({table:'expenses',id})});
  nav('expenses');
};

(async function(){
  const btn=document.getElementById('langToggle'); if(btn) btn.textContent=getLangLabel(_lang);
  const ht=document.getElementById('headerTitle'); if(ht) ht.textContent=t('systemTitle');
  buildSidebar(); buildMobNav('home');
  showLoading(t('syncing'));
  let retry=0;
  function showWaking(){
    const lo=document.getElementById('loadingOverlay'); if(!lo) return;
    lo.innerHTML=`<div style="background:rgba(13,59,110,.95);border-radius:20px;padding:36px 32px;max-width:320px;width:90%;text-align:center">
      <div style="font-size:48px;margin-bottom:16px">🚀</div>
      <div style="color:#fff;font-size:16px;font-weight:700;margin-bottom:8px">${_lang==='km'?'ម៉ាស៊ីនកំពុងដើរ...':_lang==='en'?'Server starting...':'服务器启动中...'}</div>
      <div style="background:rgba(255,255,255,.2);border-radius:100px;height:8px;overflow:hidden;margin:14px 0">
        <div id="wakeProg" style="background:#42a5f5;height:8px;border-radius:100px;width:0%;transition:width .5s"></div>
      </div>
      <div id="wakeMsg" style="color:rgba(255,255,255,.6);font-size:12px">${_lang==='km'?'កំពុងព្យាយាម...':'Connecting...'}</div>
      <button onclick="location.reload()" style="margin-top:16px;padding:10px 24px;border-radius:8px;background:rgba(255,255,255,.2);color:#fff;border:none;cursor:pointer;font-family:inherit">
        ${_lang==='km'?'ផ្ទុកឡើងវិញ':_lang==='en'?'Refresh':'刷新'}
      </button>
    </div>`; lo.classList.add('show');
  }
  async function tryConnect(){
    const r=await loadDB();
    if(r.ok){
      hideLoading();
      // 检查登录状态
      if (checkLogin()) {
        document.getElementById('appShell').style.display = '';
        document.getElementById('loginScreen').style.display = 'none';
        updateUserBadge();
        nav('home');
      } else {
        document.getElementById('loginScreen').style.display = 'flex';
        document.getElementById('appShell').style.display = 'none';
      }
      updateBadges();
      setInterval(updateBadges,60000);
      const upd=()=>{const el=document.getElementById('dateDisplay');if(el)el.textContent=new Date().toLocaleDateString(_lang==='zh'?'zh-CN':'en-US',{month:'long',day:'numeric',weekday:'short'});};
      upd(); setInterval(upd,30000);
    } else {
      retry++;
      if(retry===1) showWaking();
      if(retry>12){
        const lo=document.getElementById('loadingOverlay');
        if(lo) lo.innerHTML=`<div style="background:#fff;border-radius:14px;padding:28px;max-width:280px;text-align:center">
          <div style="font-size:36px;margin-bottom:10px">❌</div>
          <p style="font-weight:700;color:#c62828">${_lang==='km'?'មិនអាចភ្ជាប់':_lang==='en'?'Cannot connect':'无法连接'}</p>
          <button onclick="location.reload()" style="margin-top:16px;width:100%;padding:12px;border-radius:8px;background:#1565c0;color:#fff;border:none;cursor:pointer;font-family:inherit;font-size:14px">
            ${_lang==='km'?'ព្យាយាម':_lang==='en'?'Try Again':'重试'}
          </button>
        </div>`;
        return;
      }
      const prog=document.getElementById('wakeProg'); if(prog) prog.style.width=(retry/12*100)+'%';
      const msg=document.getElementById('wakeMsg'); if(msg) msg.textContent=`${retry}/12 (${r.reason||''})`;
      setTimeout(tryConnect,8000);
    }
  }
  tryConnect();
})();
</script>
