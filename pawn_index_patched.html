<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>手机抵押贷款管理系统</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Noto+Sans+Khmer:wght@400;500;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0d3b6e;--blue:#1565c0;--sky:#1e88e5;--light:#e3f2fd;
  --green:#2e7d32;--red:#c62828;--amber:#e65100;--orange:#f57c00;
  --purple:#6a1b9a;--teal:#00695c;
  --gray:#546e7a;--bg:#f0f4f8;--white:#fff;--border:#cfd8dc;
  --text:#1a2a3a;--muted:#78909c;
}
html,body{height:100%;font-family:'Noto Sans SC','Noto Sans Khmer',sans-serif;background:var(--bg);color:var(--text)}
/* HEADER */
.header{position:fixed;top:0;left:0;right:0;height:52px;background:linear-gradient(135deg,#0d3b6e,#1565c0);display:flex;align-items:center;padding:0 16px;z-index:200;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.header-title{color:#fff;font-size:15px;font-weight:700;flex:1;display:flex;align-items:center;gap:8px}
.header-right{display:flex;align-items:center;gap:8px}
.chip{background:rgba(255,255,255,.18);color:#fff;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#4caf50;display:inline-block;margin-right:4px}
.sync-dot.syncing{background:#ff9800;animation:pulse .8s infinite}
.sync-dot.error{background:#f44336}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
/* LAYOUT */
.layout{display:flex;margin-top:52px;min-height:calc(100vh - 52px)}
.sidebar{width:200px;background:linear-gradient(180deg,#0d3b6e,#1a4a8a);position:fixed;top:52px;bottom:0;overflow-y:auto;z-index:100}
.sb-logo{padding:20px 16px 12px;border-bottom:1px solid rgba(255,255,255,.1)}
.sb-logo-name{color:#fff;font-size:16px;font-weight:700}
.sb-logo-sub{color:rgba(255,255,255,.55);font-size:10px;letter-spacing:1px;text-transform:uppercase}
.sb-label{color:rgba(255,255,255,.4);font-size:10px;letter-spacing:1.5px;padding:14px 16px 4px;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 16px;color:rgba(255,255,255,.75);cursor:pointer;font-size:13px;border-left:3px solid transparent;transition:all .15s}
.nav-item:hover{background:rgba(255,255,255,.1);color:#fff}
.nav-item.active{background:rgba(255,255,255,.15);color:#fff;border-left-color:#42a5f5;font-weight:600}
.nav-icon{font-size:16px;width:20px;text-align:center}
.nav-badge{background:#f44336;color:#fff;border-radius:10px;padding:1px 6px;font-size:10px;margin-left:auto}
.nav-divider{height:1px;background:rgba(255,255,255,.1);margin:6px 0}
.main{margin-left:200px;flex:1;padding:20px;overflow-y:auto}
/* CARDS */
.card{background:#fff;border-radius:12px;padding:20px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.card-title{font-size:15px;font-weight:700;color:var(--navy)}
/* PAGE HEADER */
.page-header{margin-bottom:20px}
.page-title{font-size:22px;font-weight:700;color:var(--navy);display:flex;align-items:center;gap:10px}
.page-sub{color:var(--muted);font-size:13px;margin-top:4px}
/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.stat-card{background:#fff;border-radius:12px;padding:18px 20px;box-shadow:0 1px 4px rgba(0,0,0,.08);position:relative;overflow:hidden}
.stat-card.blue{border-top:3px solid var(--sky)}
.stat-card.green{border-top:3px solid var(--green)}
.stat-card.amber{border-top:3px solid var(--orange)}
.stat-card.red{border-top:3px solid var(--red)}
.stat-card.purple{border-top:3px solid var(--purple)}
.stat-card.teal{border-top:3px solid var(--teal)}
.stat-label{font-size:12px;color:var(--muted);margin-bottom:6px}
.stat-value{font-size:26px;font-weight:700;color:var(--navy)}
.stat-sub{font-size:11px;color:var(--muted);margin-top:4px}
.stat-icon{position:absolute;right:14px;top:14px;font-size:28px;opacity:.18}
/* FORMS */
.form-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-group.span2{grid-column:span 2}
.form-group.span3{grid-column:span 3}
.form-group label{font-size:12px;color:var(--gray);font-weight:600}
.form-group input,.form-group select,.form-group textarea{border:1.5px solid var(--border);border-radius:8px;padding:9px 12px;font-size:14px;font-family:inherit;outline:none;transition:border-color .15s}
.form-group input:focus,.form-group select:focus{border-color:var(--sky);box-shadow:0 0 0 3px rgba(30,136,229,.1)}
.form-group textarea{min-height:70px;resize:vertical}
/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:inherit;transition:all .15s}
.btn-primary{background:var(--sky);color:#fff}.btn-primary:hover{background:#1976d2}
.btn-success{background:#2e7d32;color:#fff}.btn-success:hover{background:#1b5e20}
.btn-danger{background:#c62828;color:#fff}.btn-danger:hover{background:#b71c1c}
.btn-warning{background:#e65100;color:#fff}.btn-warning:hover{background:#bf360c}
.btn-purple{background:#6a1b9a;color:#fff}.btn-purple:hover{background:#4a148c}
.btn-outline{background:#fff;border:1.5px solid var(--border);color:var(--gray)}.btn-outline:hover{border-color:var(--sky);color:var(--sky)}
.btn-sm{padding:5px 12px;font-size:12px;border-radius:6px}
.btn-row{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap}
/* TABLE */
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:var(--navy);color:#fff;padding:10px 12px;text-align:left;font-weight:600;white-space:nowrap}
td{padding:10px 12px;border-bottom:1px solid #eef2f7;vertical-align:middle}
tr:hover td{background:#f8faff}
.fw700{font-weight:700}
.text-blue{color:var(--sky)}.text-green{color:var(--green)}.text-red{color:var(--red)}.text-amber{color:var(--orange)}.text-muted{color:var(--muted)}.text-purple{color:var(--purple)}
/* BADGES */
.badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600}
.badge-blue{background:#e3f2fd;color:#1565c0}
.badge-green{background:#e8f5e9;color:#2e7d32}
.badge-red{background:#ffebee;color:#c62828}
.badge-amber{background:#fff8e1;color:#e65100}
.badge-purple{background:#f3e5f5;color:#6a1b9a}
.badge-gray{background:#eceff1;color:#546e7a}
.badge-teal{background:#e0f2f1;color:#00695c}
/* ALERT */
.alert{padding:12px 16px;border-radius:8px;font-size:13px;margin-bottom:14px;display:flex;align-items:center;gap:10px}
.alert-red{background:#ffebee;border-left:4px solid var(--red);color:var(--red)}
.alert-amber{background:#fff8e1;border-left:4px solid var(--orange);color:var(--orange)}
.alert-green{background:#e8f5e9;border-left:4px solid var(--green);color:var(--green)}
.alert-blue{background:#e3f2fd;border-left:4px solid var(--sky);color:var(--sky)}
/* EMPTY */
.empty-state{text-align:center;padding:48px 20px;color:var(--muted)}
.ei{font-size:48px;margin-bottom:12px}
/* LOADING */
.loading-overlay{display:none;position:fixed;inset:0;background:rgba(13,59,110,.85);z-index:999;align-items:center;justify-content:center;flex-direction:column;gap:16px}
.loading-overlay.show{display:flex}
.loading-spinner{width:48px;height:48px;border:4px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{color:#fff;font-size:15px}
/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;align-items:center;justify-content:center;overflow-y:auto;padding:20px}
.modal-bg.show{display:flex}
.modal{background:#fff;border-radius:14px;padding:24px;max-width:700px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal-title{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;font-size:16px;font-weight:700;color:var(--navy)}
.modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--muted);padding:4px}
/* SEARCH ROW */
.search-row{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.search-row input{flex:1;min-width:200px;border:1.5px solid var(--border);border-radius:8px;padding:8px 12px;font-size:13px;font-family:inherit;outline:none}
.search-row input:focus{border-color:var(--sky)}
/* STATUS COLORS */
.status-active{color:var(--sky);font-weight:600}
.status-settled{color:var(--green);font-weight:600}
.status-overdue{color:var(--red);font-weight:600}
.status-extended{color:var(--purple);font-weight:600}
/* MOBILE NAV */
.mob-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--border);z-index:300;box-shadow:0 -2px 12px rgba(0,0,0,.1)}
.mob-nav-inner{display:flex;justify-content:space-around;align-items:center;height:58px}
.mob-nav-item{display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 8px;cursor:pointer;flex:1;border:none;background:none;font-family:inherit;position:relative}
.mob-nav-item .mni{font-size:22px;line-height:1}
.mob-nav-item .mnl{font-size:9px;color:var(--muted);font-weight:500}
.mob-nav-item.active .mnl{color:var(--sky)}
.mob-nav-item.active .mni{transform:scale(1.15)}
.mob-badge{position:absolute;top:2px;right:10px;background:var(--red);color:#fff;font-size:9px;padding:1px 5px;border-radius:8px;font-weight:700}
.mob-more-menu{display:none;position:fixed;bottom:58px;left:0;right:0;background:#fff;z-index:299;border-top:1px solid var(--border);box-shadow:0 -4px 20px rgba(0,0,0,.15);max-height:60vh;overflow-y:auto;border-radius:16px 16px 0 0;padding:8px 0}
.mob-more-menu.open{display:block}
.mob-more-item{display:flex;align-items:center;gap:14px;padding:14px 20px;font-size:14px;cursor:pointer;border:none;background:none;width:100%;font-family:inherit;text-align:left}
.mob-more-item:active{background:#f0f7ff}
.mob-overlay{display:none;position:fixed;inset:0;z-index:298}
.mob-overlay.open{display:block}
/* PHONE CONDITION BADGES */
.cond-new{background:#e8f5e9;color:#2e7d32}
.cond-9{background:#e3f2fd;color:#1565c0}
.cond-8{background:#fff8e1;color:#e65100}
.cond-7{background:#ffebee;color:#c62828}
/* MOBILE RESPONSIVE */
@media(max-width:768px){
  html,body{overflow:auto;height:auto}
  .header{height:48px}
  .sidebar{display:none}
  .layout{margin-top:48px}
  .main{margin-left:0;padding:12px 12px 74px}
  .mob-nav{display:block}
  .stats-grid{grid-template-columns:repeat(2,1fr);gap:8px}
  .stat-value{font-size:20px}
  .form-grid{grid-template-columns:1fr}
  .form-group.span2,.form-group.span3{grid-column:span 1}
  .form-group input,.form-group select{font-size:15px;padding:12px}
  .btn{padding:12px 18px;font-size:14px}
  .btn-row{flex-direction:column}
  .btn-row .btn{width:100%}
  .table-wrap{overflow-x:auto}
  table{font-size:12px;min-width:500px}
}
@media(max-width:380px){
  .stats-grid{grid-template-columns:1fr 1fr}
}
</style>

<div class="header">

  <div id="saveErrorBanner" style="display:none;position:fixed;top:0;left:0;right:0;z-index:99998;background:#c62828;color:#fff;padding:10px 20px;align-items:center;justify-content:space-between;font-size:13px;font-weight:600">

</div>
<div class="header-right">
    <span id="syncStatus"><span class="sync-dot"></span><span id="syncText">已同步</span></span>
    <button onclick="manualRefresh()" id="refreshBtn" style="background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);color:#fff;padding:4px 10px;border-radius:20px;font-size:11px;cursor:pointer;font-family:inherit">🔄</button>

<div class="layout">

</div>

<div class="mob-nav">

</div>

function t(k){ return (I18N[_lang]||I18N.zh)[k] || k; }
function getLangLabel(l){ return l==='zh'?'🌐 EN':l==='en'?'🌐 ខ្មែរ':'🌐 中文'; }
window.toggleLang = function(){
  _lang = _lang==='zh'?'en':_lang==='en'?'km':'zh';
  localStorage.setItem('pawn_lang',_lang);
  const btn=document.getElementById('langToggle'); if(btn) btn.textContent=getLangLabel(_lang);
  const ht=document.getElementById('headerTitle'); if(ht) ht.textContent=t('systemTitle');
  buildSidebar(); buildMobNav(currentPage());
  nav(currentPage());
};

// ── Helpers ──
function today(){ return new Date().toISOString().slice(0,10); }
function fmt(n){ return '$'+(+n||0).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,','); }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function newId(){ const id=(DB_get('nextId')||1001); DB_set('nextId',id+1); return id; }
// 从服务器获取唯一ID（防止多人并发时ID重复）
async function getNextId(table='loans'){
  try{
    const res=await fetch('/api/next-id',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({table}),signal:AbortSignal.timeout(5000)});
    const json=await res.json();
    if(json.ok) return json.id;
  }catch(e){ console.warn('getNextId failed, using local:',e.message); }
  return newId(); // 降级到本地id
}
function showMsg(id,msg,color='green'){
  const el=document.getElementById(id); if(!el) return;
  const c={'green':'alert-green','red':'alert-red','amber':'alert-amber','blue':'alert-blue'}[color]||'alert-green';
  el.className=`alert ${c}`; el.textContent=msg; el.style.display='';
  setTimeout(()=>{el.style.display='none';},4000);
}
function showModal(title, body){
  document.getElementById('modalTitle').textContent=title;
  document.getElementById('modalBody').innerHTML=body;
  document.getElementById('modalBg').classList.add('show');
}
window.closeModal=function(){ document.getElementById('modalBg').classList.remove('show'); }
function showLoading(msg){ const o=document.getElementById('loadingOverlay'); if(o){o.classList.add('show'); const lt=document.getElementById('loadingText'); if(lt)lt.textContent=msg||t('syncing');} }
function hideLoading(){ document.getElementById('loadingOverlay')?.classList.remove('show'); }
function currentPage(){ return document.querySelector('.nav-item.active')?.dataset?.page||'home'; }
function daysDiff(d1,d2){ return Math.floor((new Date(d2)-new Date(d1))/86400000); }

// ── Status helpers ──
function statusBadge(status){
  if(status===_lang==='km'?'បានបិទ':_lang==='en'?'Settled':'已结清'||status==='Settled') return `<span class="badge badge-green">${t('settled')}</span>`;
  if(status==='已续期'||status==='Extended') return `<span class="badge badge-purple">${t('extended')}</span>`;
  return `<span class="badge badge-blue">${t('active')}</span>`;
}

const ROLES = {
  admin:       { name:'管理员',   level:4 },
  manager:     { name:'主管',     level:3 },
  appointment: { name:'预约专员', level:2 },
  loan:        { name:'贷款专员', level:2 },
  collection:  { name:'收款专员', level:2 },
  staff:       { name:'员工',     level:2 },
  readonly:    { name:'只读',     level:1 },
};

function getUsers() {
  const users = DB_get('users');
  if (!users || users.length === 0) {
    const defaults = [{ id:1, username:'admin', password:'admin123', role:'admin', name:'管理员', createdAt:'' }];
    DB_set('users', defaults);
    return defaults;
  }
  return users;
}

let _currentUser = null;
function hasRole(minRole) {
  if (!_currentUser) return false;
  const levels = { admin:4, manager:3, appointment:2, loan:2, collection:2, staff:2, readonly:1 };
  return (levels[_currentUser.role]||0) >= (levels[minRole]||0);
}
function isAdmin()   { return hasRole('admin'); }
function isManager() { return hasRole('manager'); }
function isStaff()   { return hasRole('staff'); }
function isAppointment() { return _currentUser && _currentUser.role==='appointment'; }
function isLoan()        { return _currentUser && _currentUser.role==='loan'; }
function isCollection()  { return _currentUser && _currentUser.role==='collection'; }
function isSpecialist()  { return isAppointment()||isLoan()||isCollection(); }
function canAccessAppointment() { return _currentUser && ['admin','manager','appointment','loan'].includes(_currentUser.role); }
function canAccessLoanAdd()     { return _currentUser && ['admin','manager','loan'].includes(_currentUser.role); }
function canAccessCollection()  { return _currentUser && ['admin','manager','collection'].includes(_currentUser.role); }
function canEditLoan(loan) {
  if (!_currentUser) return false;
  if (hasRole('manager')) return true;
  if (['staff','loan','appointment','collection'].includes(_currentUser.role)) return (loan.createdBy === _currentUser.username);
  return false;
}
function checkLogin() {
  const saved = sessionStorage.getItem('pawn_user');
  if (saved) { try { _currentUser = JSON.parse(saved); return true; } catch(e) {} }
  return false;
}
window.doLogin = async function() {
  const username = (document.getElementById('loginUsername')?.value||'').trim();
  const password = (document.getElementById('loginPassword')?.value||'').trim();
  const msg = document.getElementById('loginMsg');
  const loginBtn = document.querySelector('#loginScreen button');
  if (!username || !password) { msg.textContent='请输入用户名和密码'; return; }
  
  msg.textContent='⏳ 登录中...'; msg.style.color='#1565c0';
  if(loginBtn){ loginBtn.disabled=true; loginBtn.textContent='登录中...'; }
  
  // 如果DB未加载，先加载
  if(!_dbReady){
    const r = await loadDB();
    if(!r.ok){
      msg.textContent='❌ 网络连接失败，请刷新重试';
      msg.style.color='#c62828';
      if(loginBtn){ loginBtn.disabled=false; loginBtn.textContent='登 录'; }
      return;
    }
  }
  
  const users = getUsers();
  const user = users.find(u => u.username===username && u.password===password);
  if (!user) {
    msg.textContent='用户名或密码错误';
    msg.style.color='#c62828';
    if(loginBtn){ loginBtn.disabled=false; loginBtn.textContent='登 录'; }
    return;
  }
  _currentUser = user;
  sessionStorage.setItem('pawn_user', JSON.stringify(user));
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('appShell').style.display='';
  if(loginBtn){ loginBtn.disabled=false; loginBtn.textContent='登 录'; }
  updateUserBadge();
  // 自动修复：把没有任何已还款记录但状态为已结清的合同改回进行中
  setTimeout(async()=>{
    const loans=DB_get('loans')||[];
    let fixed=0;
    for(const l of loans){
      if(l.status==='已结清'){
        const anyPaid=l.schedule&&l.schedule.some(p=>p.paid===true);
        if(!anyPaid){
          l.status='进行中';
          fixed++;
          await saveRecord('loans',l);
        }
      }
    }
    if(fixed>0){ DB_set('loans',loans); console.log(`✅ 自动修复 ${fixed} 笔合同状态`); }
  },2000);
  nav(_currentPage||'home');
};

window.downloadBackup = async function() {
  const btn = event?.target;
  try {
    if(btn){ btn.textContent='⏳ 备份中...'; btn.disabled=true; }
    const res = await fetch('/api/data', {cache:'no-store'});
    const data = await res.json();
    const now = new Date();
    const dateStr = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}_${String(now.getHours()).padStart(2,'0')}${String(now.getMinutes()).padStart(2,'0')}`;
    const loans = data.loans || [];
    const pays = data.payments || [];

    // ── 1. JSON备份（系统恢复用）──
    const jsonBlob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
    const a1 = document.createElement('a');
    a1.href = URL.createObjectURL(jsonBlob);
    a1.download = `MORODOK_backup_${dateStr}.json`; a1.click();
    URL.revokeObjectURL(a1.href);
    await new Promise(r=>setTimeout(r,600));

    // ── 2. 合同表 CSV ──
    const loanHeaders = ['合同ID','合同编号','日期','客户姓名','客户电话','身份证号','店铺','业务员','手机品牌','手机型号','IMEI','贷款金额',_lang==='km'?'ការបញ្ចេញប្រាក់':_lang==='en'?'Actual Disbursement':'实际放款','月利息','首次还款日','状态',_lang==='km'?'ចាក់សោ':_lang==='en'?'Locked':'锁机',_lang==='km'?'បញ្ជីខ្មៅ':_lang==='en'?'Blacklist':'黑名单','录入人'];
    const loanRows = loans.map(l => [
      l.id, l.contractNo||'', l.date||'', l.customer||'', l.customerPhone||'',
      l.idNumber||'', l.shopName||'', l.salesperson||'',
      l.phoneBrand||'', l.phoneModel||'', l.phoneImei||'',
      l.loanAmount||0, l.actualAmount||0, l.monthlyInterest||0,
      l.firstDue||'', l.status||'',
      l.lockStatus||_lang==='km'?'មិនចាក់':_lang==='en'?'Unlocked':'未锁', l.blacklist?_lang==='km'?'បញ្ជីខ្មៅ':_lang==='en'?'Blacklist':'黑名单':_lang==='km'?'បញ្ជីស':_lang==='en'?'Whitelist':'白名单', l.createdBy||''
    ]);
    function toCSV(headers, rows) {
      const esc = v => { const s=String(v??'').replace(/"/g,'""'); return (s.includes(',')||s.includes('"')||s.includes('\n'))?`"${s}"`:s; };
      return '﻿' + [headers.join(','), ...rows.map(r=>r.map(esc).join(','))].join('\n');
    }
    const a2 = document.createElement('a');
    a2.href = URL.createObjectURL(new Blob([toCSV(loanHeaders,loanRows)],{type:'text/csv;charset=utf-8'}));
    a2.download = `MORODOK_合同表_${dateStr}.csv`; a2.click();
    URL.revokeObjectURL(a2.href);
    await new Promise(r=>setTimeout(r,600));

    // ── 3. 还款记录 CSV ──
    const payHeaders = ['记录ID','合同ID',t('referralCustomer'),'期数','日期','本金($)','利息($)','滞纳金($)','合计($)'];
    const payRows = pays.map(p => [
      p.id, p.loanId, p.customer||'', p.period||'', p.date||'',
      p.paidPrincipal||0, p.paidInterest||0, p.penalty||0,
      (+p.paidPrincipal||0)+(+p.paidInterest||0)+(+p.penalty||0)
    ]);
    const a3 = document.createElement('a');
    a3.href = URL.createObjectURL(new Blob([toCSV(payHeaders,payRows)],{type:'text/csv;charset=utf-8'}));
    a3.download = `MORODOK_还款记录_${dateStr}.csv`; a3.click();
    URL.revokeObjectURL(a3.href);

    if(btn){ btn.textContent='💾 备份'; btn.disabled=false; }
    alert(`✅ 备份成功！已下载3个文件：

📄 JSON备份文件（系统恢复用）
📊 合同表 CSV（可用Excel打开）
📊 还款记录 CSV（可用Excel打开）

合同：${loans.length} 笔 ｜ 还款记录：${pays.length} 条`);
  } catch(e) {
    if(btn){ btn.textContent='💾 备份'; btn.disabled=false; }
    alert('❌ 备份失败：' + e.message);
  }
};

// ── 数据恢复（管理员专用）──
window.restoreBackup = async function() {
  if(!isAdmin()) { alert('只有管理员可以恢复数据'); return; }
  const input = document.createElement('input');
  input.type = 'file'; input.accept = '.json';
  input.onchange = async function(e) {
    const file = e.target.files[0]; if(!file) return;
    const text = await file.text();
    let data;
    try { data = JSON.parse(text); } catch(e) { alert('文件格式错误，请选择正确的备份文件'); return; }
    if(!data.loans || !Array.isArray(data.loans)) { alert('备份文件无效'); return; }
    const confirm1 = confirm(`确认恢复备份？

备份包含：
• 合同 ${data.loans.length} 笔
• 还款记录 ${(data.payments||[]).length} 条

⚠️ 警告：这将覆盖现有数据！`);
    if(!confirm1) return;
    const confirm2 = confirm('再次确认：恢复后现有数据将被替换，此操作不可撤销！');
    if(!confirm2) return;
    try {
      const res = await fetch('/api/data', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify(data)
      });
      if(res.ok) {
        alert('✅ 数据恢复成功！页面即将刷新');
        location.reload();
      } else {
        alert('❌ 恢复失败，请重试');
      }
    } catch(e) { alert('❌ 恢复失败：' + e.message); }
  };
  input.click();
};

// ── DB ──
let _db=null, _dirty=false, _dbReady=false, _syncTimer=null, _lastSync=null;
function DB_get(k){ return _db?_db[k]:null; }
function DB_set(k,v){ if(!_db||!_dbReady){console.warn('DB not ready');return;} _db[k]=v; markDirty(); }
function markDirty(){ if(!_dbReady) return; _dirty=true; /* 不自动saveDB，改用saveRecord单条保存 */ }
function setSyncStatus(s){
  const dot=document.querySelector('.sync-dot'), txt=document.getElementById('syncText');
  if(dot) dot.className='sync-dot'+(s==='syncing'?' syncing':s==='error'?' error':'');
  if(txt) txt.textContent=s==='syncing'?t('syncing'):s==='error'?t('syncError'):t('synced');
}
async function loadDB(){
  try{
    const ctrl=new AbortController(), timer=setTimeout(()=>ctrl.abort(),20000);
    const res=await fetch('/api/data',{cache:'no-store',signal:ctrl.signal}); clearTimeout(timer);
    if(!res.ok) return {ok:false,reason:`HTTP ${res.status}`};
    const data=await res.json();
    if(!data||typeof data!=='object') return {ok:false,reason:'Invalid JSON'};
    ['loans','payments','extensions','expenses','stores','users'].forEach(k=>{if(!Array.isArray(data[k]))data[k]=[];});
    if(!data.nextId) data.nextId=1001;
    if(!data.company) data.company={name:'MORODOK',address:'',phone:'',note:''};
    // 确保默认管理员存在
    if(!data.users||data.users.length===0) data.users=[{id:1,username:'admin',password:'admin123',role:'admin',name:'管理员',createdAt:''}];
    _db=data; _dbReady=true; _lastSync=Date.now();
    try{ const el=document.getElementById('companyName'); if(el&&data.company?.name) el.textContent=data.company.name; }catch(e){}
    return {ok:true};
  }catch(e){ return {ok:false,reason:e.name==='AbortError'?'Timeout':e.message}; }
}
// 保存单条记录到服务器（防并发覆盖）
async function saveRecord(table, record){
  try{
    const res=await fetch('/api/save-record',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({table,record}),
      signal:AbortSignal.timeout(10000)
    });
    const json=await res.json();
    if(!json.ok) console.error('saveRecord error:',json.error);
    return json.ok;
  }catch(e){
    console.error('saveRecord failed:',e.message);
    return false;
  }
}

async function saveDB(){
  if(!_dbReady||!_db) return;
  setSyncStatus('syncing');
  // 最多重试3次，每次间隔2秒，防止Render休眠导致丢数据
  for(let attempt=1; attempt<=3; attempt++){
    try{
      const res=await fetch('/api/data',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify(_db),
        signal: AbortSignal.timeout(15000) // 15秒超时
      });
      if(!res.ok) throw new Error('HTTP '+res.status);
      setSyncStatus('ok'); _dirty=false; _lastSync=Date.now();
      return; // 成功直接返回
    }catch(e){
      console.warn(`saveDB attempt ${attempt} failed:`, e.message);
      if(attempt < 3){
        setSyncStatus('syncing');
        await new Promise(r=>setTimeout(r, 2000*attempt)); // 递增等待
      } else {
        setSyncStatus('error');
        console.error('❌ 数据保存失败');
        // 显示醒目的失败提示
        const errDiv = document.getElementById('saveErrorBanner');
        if(errDiv) {
          errDiv.style.display='flex';
          setTimeout(()=>{ errDiv.style.display='none'; }, 10000);
        }
      }
    }
  }
}
window.manualRefresh=async function(){

};

      <button onclick="document.getElementById('pwdOv').remove()" style="flex:1;padding:10px;border-radius:8px;border:1.5px solid #cfd8dc;background:#fff;color:#546e7a;cursor:pointer;font-family:inherit">${t('cancel')}</button>
      <button id="pwdOk" style="flex:1;padding:10px;border-radius:8px;border:none;background:var(--sky);color:#fff;cursor:pointer;font-family:inherit;font-weight:600" onclick="

        else{const e=document.getElementById('pwdErr');if(e)e.textContent='${_lang==='km'?'ពាក្យសម្ងាត់មិនត្រូវ':'Wrong password'}';

const PAGES={
  'user-mgmt':renderUserMgmt,'home':renderHome,'loan-add':renderLoanAdd,'loan-list':renderLoanList,
  'payment-add':renderPaymentAdd,'extension':renderExtension,
  'stats':renderStats,'finance':renderFinance,'expenses':renderExpenses,
  'bad-debt':renderBadDebt,
  'overdue':renderOverdue,'tomorrow':renderTomorrow,'company':renderCompany,
  'appointment':renderAppointment,
};
// 只读用户只能访问的页面
const READONLY_PAGES = ['home','loan-list'];
// 员工不能访问的页面
const STAFF_BLOCKED = ['stats','stats-interest','finance','expenses','bad-debt'];
// 各专员允许的页面白名单
const APPOINTMENT_PAGES = ['home','appointment','loan-list'];
const LOAN_PAGES        = ['home','appointment','loan-add','loan-list'];
const COLLECTION_PAGES  = ['home','loan-list','payment-add','extension'];



function nav(page){
  buildSidebar(); buildMobNav(page); closeMobMore();
  // 只读权限检查
  if(_currentUser && _currentUser.role==='readonly' && !READONLY_PAGES.includes(page)){
    showMsg('mainContent','<div class="card"><div class="empty-state"><div class="ei">🔒</div><p style="color:var(--red);font-weight:700">无权访问此页面</p><p style="font-size:12px;color:var(--muted)">只读账户仅可查看贷款列表</p></div></div>','');
    const mc=document.getElementById('mainContent');
    if(mc) mc.innerHTML='<div class="card"><div class="empty-state"><div class="ei">🔒</div><p style="color:var(--red);font-weight:700">无权访问此页面</p><p style="font-size:12px;color:var(--muted)">只读账户仅可查看贷款列表</p></div></div>';
    return;
  }
  // 员工权限检查
  // 专员页面权限拦截
  if(_currentUser && _currentUser.role==='appointment' && !APPOINTMENT_PAGES.includes(page)){
    nav('home'); return;
  }
  if(_currentUser && _currentUser.role==='loan' && !LOAN_PAGES.includes(page)){
    nav('home'); return;
  }
  if(_currentUser && _currentUser.role==='collection' && !COLLECTION_PAGES.includes(page)){
    nav('home'); return;
  }
  if(_currentUser && _currentUser.role==='appointment' && !APPOINTMENT_PAGES.includes(page)){ nav('home'); return; }
  if(_currentUser && _currentUser.role==='loan' && !LOAN_PAGES.includes(page)){ nav('home'); return; }
  if(_currentUser && _currentUser.role==='collection' && !COLLECTION_PAGES.includes(page)){ nav('home'); return; }
  if(_currentUser && _currentUser.role==='staff' && STAFF_BLOCKED.includes(page)){
    const mc=document.getElementById('mainContent');
    if(mc) mc.innerHTML='<div class="card"><div class="empty-state"><div class="ei">🔒</div><p style="color:var(--red);font-weight:700">无权访问此页面</p><p style="font-size:12px;color:var(--muted)">员工账户无法查看财务统计</p></div></div>';
    return;
  }
  if(PROTECTED.includes(page)&&!_unlocked){requirePwd(page,()=>nav(page));return;}
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.toggle('active',el.dataset.page===page));
  if(!_dirty){
    loadDB().then(r=>{
      if(r.ok){
        const fn=PAGES[page],mc=document.getElementById('mainContent');
        if(fn&&mc){mc.innerHTML=fn();mc.scrollTop=0;initPage(page);}
        updateBadges();
      }
    });
  } else {
    const fn=PAGES[page],mc=document.getElementById('mainContent');
    if(fn&&mc){mc.innerHTML=fn();mc.scrollTop=0;initPage(page);}
    updateBadges();
  }
}
function initPage(page){
  if(page==='loan-add'){ calcLoan(); autoSetFirstDue(); }
  if(page==='payment-add') loadLoanPeriods();
  if(page==='extension') loadExtLoan();
}
function updateBadges(){
  const td=today();
  const loans=DB_get('loans')||[];
  const cnt=loans.reduce((c,l)=>c+l.schedule.filter(p=>!p.paid&&p.dueDate<td).length,0);
  ['overdueBadge','mobBadge'].forEach(id=>{const b=document.getElementById(id);if(b){b.style.display=cnt>0?'':'none';b.textContent=cnt;}});
}

window.previewDoc=async function(docKey, input){
  const file=input.files[0]; if(!file) return;
  const slot=document.getElementById(`docSlot_${docKey}`);
  const preview=document.getElementById(`docPreview_${docKey}`);
  // 压缩
  const base64=await compressImage(file,500);
  window._pendingDocs[docKey]=base64;
  // 预览
  if(preview) preview.innerHTML=`<img src="${base64}" style="width:100%;max-height:45px;object-fit:cover;border-radius:4px;margin-bottom:2px"><div style="font-size:10px;color:var(--green);font-weight:700">✅ 已选择</div>`;

  // 更新计数
  const cnt=Object.keys(window._pendingDocs).length;
  const el=document.getElementById('docCount'); if(el) el.textContent=cnt;
};

window.calcAgeFromDob=function(){
  const dob=document.getElementById('lDob')?.value;
  const ageEl=document.getElementById('lAge');
  if(!dob||!ageEl) return;
  const today=new Date();
  const birth=new Date(dob);
  let age=today.getFullYear()-birth.getFullYear();
  const m=today.getMonth()-birth.getMonth();
  if(m<0||(m===0&&today.getDate()<birth.getDate())) age--;
  ageEl.value=age>0?age:'';
};

window.calcLoan=function(){
  // 兼容旧路径：如果直接调用calcLoan，也触发从还款金额计算
  calcLoanFromPayment();
};
window.calcLoanFromPayment=function(){
  const amt=+(document.getElementById('lAmount')?.value||0);
  const mPayment=+(document.getElementById('lMonthlyPayment')?.value||0);
  const periods=+(document.getElementById('lPeriods')?.value||3);
  const set=(id,v)=>{const el=document.getElementById(id);if(el)el.textContent=fmt(v);};
  if(!amt||!mPayment||!periods){
    set('cMonthlyInt',0);set('cMonthlyP',0);set('cTotalInt',0);set('cTotalRepay',0);
    // 清空隐藏利率
    const rateEl=document.getElementById('lRate');if(rateEl)rateEl.value='0';
    return;
  }
  const mP=amt/periods;                      // 每月本金
  const mInt=mPayment-mP;                    // 每月利息 = 每月还款 - 每月本金
  const tInt=mInt*periods;                   // 总利息
  const tRepay=amt+tInt;                     // 还款总额
  const rate=amt>0?(mInt/amt)*100:0;         // 月利率（%) 反算，隐藏不展示
  // 存入隐藏字段供保存时使用
  const rateEl=document.getElementById('lRate');if(rateEl)rateEl.value=rate.toFixed(4);
  set('cMonthlyInt',mInt>=0?mInt:0);
  set('cMonthlyP',mP);
  set('cTotalInt',tInt>=0?tInt:0);
  set('cTotalRepay',tRepay>=0?tRepay:0);
};

window.submitLoan=async function(){
  if(_currentUser&&(_currentUser.role==='readonly')){alert('无权限：只读账户不能录入合同');return;}
  if(isSpecialist()&&!canAccessLoanAdd()){alert('无权限：您没有抵押登记权限');return;}
  if(isSpecialist()&&!canAccessLoanAdd()){alert('无权限：您没有抵押登记权限');return;}
  const cust=document.getElementById('lCust')?.value?.trim();
  if(!cust){showMsg('loanMsg',t('msgFillCustomer'),'red');return;}

  // ── 同名客户检查：进行中的合同不能有相同名字 ──
  const existLoan=(DB_get('loans')||[]).find(l=>
    l.status===_lang==='km'?'កំពុងដំណើរ':_lang==='en'?'Active':'进行中' &&
    (l.customer||'').trim().toLowerCase()===cust.toLowerCase()
  );
  if(existLoan){
    showMsg('loanMsg',`❌ 客户 "${cust}" 已有进行中的合同 #${existLoan.id}，不能重复借款！如需续期请到【续期办理】操作。`,'red');
    return;
  }

  // 🔎 客户交叉查询：检查该客户是否已在手机分期系统(MORODOK)有未结清贷款，或历史名单有不良记录
  const custPhone=document.getElementById('lPhone')?.value?.trim()||'';
  const custIdNumber=document.getElementById('lId')?.value?.trim()||'';
  if (window.CustomerCheck) {
    const _ccOk = await CustomerCheck.confirmBeforeSubmit(cust, custPhone, custIdNumber);
    if (!_ccOk) { showMsg('loanMsg', '已取消提交', 'red'); return; }
  }

  const brand=document.getElementById('lBrand')?.value||'';
  const modelSelectEl=document.getElementById('lModelSelect');
  const modelInputEl=document.getElementById('lModel');
  const model=brand==='Apple'?(modelSelectEl?.value?.trim()||''):(modelInputEl?.value?.trim()||'');
  if(!model){showMsg('loanMsg',t('msgFillModel'),'red');return;}
  const cond=document.getElementById('lCond')?.value;
  if(!cond){showMsg('loanMsg',t('msgFillCondition'),'red');return;}
  const amt=+(document.getElementById('lAmount')?.value||0);
  if(!amt){showMsg('loanMsg',t('msgFillAmount'),'red');return;}
  const firstDue=document.getElementById('lFirstDue')?.value;
  if(!firstDue){showMsg('loanMsg',t('msgFillDue'),'red');return;}
  const periods=+(document.getElementById('lPeriods')?.value||3);
  const mPayment=+(document.getElementById('lMonthlyPayment')?.value||0);
  if(!mPayment){showMsg('loanMsg','请填写每月还款金额','red');return;}
  const mP=amt/periods;
  const mInt=mPayment-mP;
  const rate=amt>0?(mInt/amt):0;  // 月利率（小数）供内部记录
  // Build schedule
  const schedule=[];
  let dueDate=new Date(firstDue);
  for(let i=0;i<periods;i++){
    schedule.push({
      period:i+1,
      dueDate:dueDate.toISOString().slice(0,10),
      principalDue:parseFloat(mP.toFixed(2)),
      interestDue:parseFloat(mInt.toFixed(2)),
      paid:false,paidDate:null,
      paidPrincipal:0,paidInterest:0,penalty:0
    });
    dueDate=new Date(dueDate); dueDate.setMonth(dueDate.getMonth()+1);
  }
  const contractNo=document.getElementById('lContractNo')?.value?.trim()||'';
  const loanId=await getNextId('loans');
  const loan={
    id:loanId,
    createdBy:_currentUser?.username||'',
    createdByName:_currentUser?.name||'',
    contractNo:contractNo,
    date:document.getElementById('lDate')?.value||today(),
    customer:cust,
    customerPhone:document.getElementById('lPhone')?.value?.trim()||'',
    customerId:document.getElementById('lId')?.value?.trim()||'',
    shopName:document.getElementById('lShop')?.value?.trim()||'',
    salesperson:document.getElementById('lSales')?.value?.trim()||'',
    phoneBrand:brand,
    phoneModel:model,
    phoneStorage:document.getElementById('lStorage')?.value||'',
    phoneColor:document.getElementById('lColor')?.value?.trim()||'',
    phoneCondition:cond,
    phoneImei:document.getElementById('lImei')?.value?.trim()||'',
    phoneNote:document.getElementById('lPhoneNote')?.value?.trim()||'',
    lockStatus:_lang==='km'?'មិនចាក់':_lang==='en'?'Unlocked':'未锁',
    emgContact1:{name:document.getElementById('lEmg1Name')?.value?.trim()||'',phone:document.getElementById('lEmg1Phone')?.value?.trim()||'',relation:document.getElementById('lEmg1Rel')?.value?.trim()||''},
    emgContact2:{name:document.getElementById('lEmg2Name')?.value?.trim()||'',phone:document.getElementById('lEmg2Phone')?.value?.trim()||'',relation:document.getElementById('lEmg2Rel')?.value?.trim()||''},
    emgContact3:{name:document.getElementById('lEmg3Name')?.value?.trim()||'',phone:document.getElementById('lEmg3Phone')?.value?.trim()||'',relation:document.getElementById('lEmg3Rel')?.value?.trim()||''},
    loanAmount:amt,monthlyRate:+(document.getElementById('lRate')?.value||0),
    periods,firstDue,actualAmount:+(document.getElementById('lActualAmount')?.value||amt),
    monthlyInterest:parseFloat(mInt.toFixed(2)),
    monthlyPrincipal:parseFloat(mP.toFixed(2)),
    totalInterest:parseFloat((mInt*periods).toFixed(2)),
    note:document.getElementById('lNote')?.value?.trim()||'',
    interestType:document.getElementById('lInterestType')?.value||'normal',
    reducedRate:document.getElementById('lInterestType')?.value==='reduced'?(+(document.getElementById('lReducedRate')?.value||0)):null,
    referralType:document.getElementById('lInterestType')?.value==='referral'?(document.getElementById('lReferralType')?.value||''):null,
    referralName:document.getElementById('lInterestType')?.value==='referral'?(document.getElementById('lReferralName')?.value?.trim()||''):null,
    schedule,status:_lang==='km'?'កំពុងដំណើរ':_lang==='en'?'Active':'进行中',extensions:[]
  };
  const loans=DB_get('loans')||[];
  loans.push(loan); DB_set('loans',loans);
  // 保存nextId
  saveConfig('nextId', loan.id+1);
  // 强制保存，等待结果
  const saveBtn = document.querySelector('button[onclick="submitLoan()"]');
  if(saveBtn){ saveBtn.disabled=true; saveBtn.textContent='⏳ 保存中...'; }
  showMsg('loanMsg','⏳ 正在保存到服务器...','');
  // 直接保存单条记录，不覆盖其他人的数据
  const saveOk = await saveRecord('loans', loan);
  if(saveOk){
      showMsg('loanMsg',`✅ 合同 #${loan.id} 保存成功！`,'green');
      if(saveBtn){ saveBtn.disabled=false; saveBtn.textContent=t('saveLoan'); }
      // 如果是从预约单转单过来，自动更新预约单状态为已成交
      if(window._fromApptId){
        const appts=DB_get('appointments')||[];
        const a=appts.find(x=>x.id===window._fromApptId);
        if(a){ a.status='已成交'; DB_set('appointments',appts); saveRecord('appointments',a); }
        window._fromApptId=null;
      }
      // 上传待传图片
      const docs=_docsToUpload||{};
      const docKeys=Object.keys(docs);
      if(docKeys.length>0){
        showMsg('loanMsg',`✅ 合同已保存，正在上传 ${docKeys.length} 张材料...`,'green');
        let uploaded=0; let failed=0;
        for(const docKey of docKeys){
          try{
            const res=await fetch('/api/upload-doc',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({loanId:loan.id,docKey,base64:docs[docKey]})});
            const json=await res.json();
            if(json.ok){
              const loans2=DB_get('loans')||[];
              const l2=loans2.find(x=>x.id===loan.id);
              if(l2){if(!l2.documents)l2.documents={};l2.documents[docKey]=json.url;DB_set('loans',loans2);}
              uploaded++;
            } else { failed++; }
          } catch(e){ failed++; }
        }
        if(uploaded>0){
          const loans2=DB_get('loans')||[];
          const l2=loans2.find(x=>x.id===loan.id);
          if(l2) await saveRecord('loans',l2);
        }
        if(failed===0) showMsg('loanMsg',`✅ 合同 #${loan.id} 保存成功！材料已上传 ${uploaded} 张 📎`,'green');
        else showMsg('loanMsg',`✅ 合同已保存，材料上传 ${uploaded} 成功 / ${failed} 失败（可进合同详情补传）`,'green');
      }
  } else {
      showMsg('loanMsg',`❌ 保存失败！请重试`,'red');
      if(saveBtn){ saveBtn.disabled=false; saveBtn.textContent=t('saveLoan'); }
  }  
  ['lContractNo','lCust','lPhone','lId','lShop','lSales','lBrand','lModel','lColor','lImei','lPhoneNote','lNote','lEmg1Name','lEmg1Phone','lEmg1Rel','lEmg2Name','lEmg2Phone','lEmg2Rel','lEmg3Name','lEmg3Phone','lEmg3Rel','lReferralName','lReducedRate'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});;
  // 清空材料预览UI（但不清空_pendingDocs，让上传流程自己清）
  const _docsToUpload=Object.assign({},window._pendingDocs);
  window._pendingDocs={};
  ['id-card-front','id-card-back','household-cover','household-page','fb-1','fb-2','fb-3','fb-4','bank-1','bank-2','bank-3','payment-qr','risk-form','contract','contract-selfie','spare-1','spare-2','spare-3'].forEach(k=>{
    const p=document.getElementById(`docPreview_${k}`); if(p) p.innerHTML='';
    const s=document.getElementById(`docSlot_${k}`); if(s) s.style.border='';
  });
  const cnt=document.getElementById('docCount'); if(cnt) cnt.textContent='0';
  const mpEl=document.getElementById('lMonthlyPayment');if(mpEl)mpEl.value='';
  ['lAmount','lFirstDue'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  document.getElementById('lStorage').value='';
  document.getElementById('lCond').value='';
  document.getElementById('lPeriods').value='3';
  calcLoan(); updateBadges();
};

window.filterLoans=function(){
  const q=(document.getElementById('lSearch')?.value||'').toLowerCase();
  const st=document.getElementById('lStatusFilter')?.value||'';
  const mo=document.getElementById('lMonthFilter')?.value||'';
  let list=DB_get('loans')||[];
  if(q) list=list.filter(l=>l.customer.toLowerCase().includes(q)||String(l.id).includes(q)||(l.contractNo||'').toLowerCase().includes(q)||(l.phoneModel||'').toLowerCase().includes(q)||(l.phoneImei||'').includes(q));
  if(st) list=list.filter(l=>l.status===st);
  if(mo) list=list.filter(l=>l.date.slice(0,7)===mo);
  const wrap=document.getElementById('loanTableWrap');
  if(wrap) wrap.innerHTML=buildLoanTable(list.slice().reverse());
};
function buildLoanTable(loans){
  if(!loans.length) return `<div class="empty-state"><div class="ei">📋</div><p>${t('noRecord')}</p></div>`;
  const td=today();
  // 按日期分组
  const groups={};
  loans.forEach(l=>{
    const d=l.date||'未知';
    if(!groups[d]) groups[d]=[];
    groups[d].push(l);
  });
  const sortedDates=Object.keys(groups).sort().reverse();
  const thead=`<tr><th>${t('colNo')}</th><th>${_lang==='km'?'លេខសន្យា':_lang==='en'?'Contract#':'合同编号'}</th><th>${t('colDate')}</th><th>${t('colCustomer')}</th><th>${t('colModel')}</th><th>${t('colImei')}</th>

  return sortedDates.map(date=>{
    const dayLoans=groups[date];

    return `<div class="card" style="margin-bottom:8px;padding:0;overflow:hidden">

window._openDays=window._openDays||new Set();
window.toggleDayGroup=function(uid){
  const el=document.getElementById(uid);
  const icon=document.getElementById(uid+'_icon');
  if(!el) return;
  if(el.style.display==='none'){
    el.style.display='';
    if(icon)icon.textContent='▼';
    window._openDays.add(uid);
  } else {
    el.style.display='none';
    if(icon)icon.textContent='▶';
    window._openDays.delete(uid);
  }
};

// 前端图片压缩
async function compressImage(file, maxKB=500){
  return new Promise(resolve=>{
    const reader=new FileReader();
    reader.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        let w=img.width, h=img.height;
        const maxPx=1600;
        if(w>maxPx||h>maxPx){ const r=Math.min(maxPx/w,maxPx/h); w=Math.round(w*r); h=Math.round(h*r); }
        const canvas=document.createElement('canvas');
        canvas.width=w; canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        let q=0.85;
        const tryCompress=()=>{
          const dataUrl=canvas.toDataURL('image/jpeg',q);
          const kb=(dataUrl.length*3/4)/1024;
          if(kb<=maxKB||q<=0.3){ resolve(dataUrl); return; }
          q-=0.1; tryCompress();
        };
        tryCompress();
      };
      img.src=e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

window.uploadDoc=async function(loanId, docKey, input){
  const file=input.files[0]; if(!file) return;
  const msgEl=document.getElementById(`uploadMsg_${loanId}`);
  if(msgEl) msgEl.textContent='⏳ 压缩上传中...';
  try{
    const base64=await compressImage(file,500);
    const res=await fetch(`/api/upload-doc`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({loanId,docKey,base64})
    });
    const json=await res.json();
    if(!json.ok) throw new Error(json.error||'上传失败');
    const loans=DB_get('loans')||[];
    const loan=loans.find(l=>l.id===loanId);
    if(loan){ if(!loan.documents) loan.documents={}; loan.documents[docKey]=json.url; DB_set('loans',loans); await saveRecord('loans',loan); }
    if(msgEl) msgEl.textContent='✅ 上传成功！';
    setTimeout(()=>viewLoan(loanId),600);
  }catch(e){
    if(msgEl){ msgEl.style.color='var(--red)'; msgEl.textContent='❌ '+e.message; }
  }
};

window.deleteDoc=async function(loanId, docKey){
  if(!confirm('确定删除这张图片？')) return;
  try{
    await fetch(`/api/delete-doc`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({loanId,docKey})
    });
    const loans=DB_get('loans')||[];
    const loan=loans.find(l=>l.id===loanId);
    if(loan&&loan.documents) { delete loan.documents[docKey]; DB_set('loans',loans); await saveRecord('loans',loan); }
    viewLoan(loanId);
  }catch(e){ alert('删除失败：'+e.message); }
};

window.addUser = async function() {
  const name = document.getElementById('nu_name')?.value.trim();
  const username = document.getElementById('nu_username')?.value.trim();
  const password = document.getElementById('nu_password')?.value.trim();
  const role = document.getElementById('nu_role')?.value;
  const msg = document.getElementById('userMsg');
  if (!name||!username||!password) { msg.innerHTML='<span style="color:red">请填写完整信息</span>'; return; }
  if (password.length < 4) { msg.innerHTML='<span style="color:red">密码至少4位</span>'; return; }
  const users = getUsers();
  if (users.find(u=>u.username===username)) { msg.innerHTML='<span style="color:red">用户名已存在</span>'; return; }
  const newUser = { id: Date.now(), username, password, name, role, createdAt: today() };
  users.push(newUser);
  // 直接调用API保存，不依赖DB_set的延迟机制
  msg.innerHTML='<span style="color:var(--sky)">⏳ 保存中...</span>';
  try {
    DB_set('users', users);
    // 单条保存用户
    const newUser=users[users.length-1]; await saveRecord('users', newUser);
    msg.innerHTML='<span style="color:green">✅ 用户添加成功</span>';
    ['nu_name','nu_username','nu_password'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
    setTimeout(()=>{ const mc=document.getElementById('mainContent'); if(mc){mc.innerHTML=renderUserMgmt();} }, 600);
  } catch(e) {
    msg.innerHTML='<span style="color:red">❌ 保存失败，请重试</span>';
  }
};

window.deleteUser = async function(id) {
  if (!confirm('确认删除该用户？')) return;
  let users = getUsers().filter(u=>u.id!==id);
  DB_set('users', users);
  fetch('/api/delete-record',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({table:'users',id})});
  const mc=document.getElementById('mainContent'); if(mc){mc.innerHTML=renderUserMgmt();}
};

window.resetUserPwd = async function(id) {
  const newPwd = prompt('请输入新密码（至少4位）');
  if (!newPwd || newPwd.length < 4) { alert('密码至少4位'); return; }
  const users = getUsers();
  const idx = users.findIndex(u=>u.id===id);
  if (idx>=0) {
    users[idx].password = newPwd;
    DB_set('users', users);
    await saveRecord('users', users[idx]);
    alert('✅ 密码重置成功');
  }
};

window.changeUserRole = async function(id, newRole) {
  if(!newRole) return;
  const users = getUsers();
  const idx = users.findIndex(u=>u.id===id);
  if(idx<0) return;
  const roleNames = {manager:'主管',appointment:'预约专员',loan:'贷款专员',collection:'收款专员',readonly:'只读'};
  if(!confirm(`确认将「${users[idx].name||users[idx].username}」的角色改为「${roleNames[newRole]||newRole}」？`)) return;
  users[idx].role = newRole;
  DB_set('users', users);
  await saveRecord('users', users[idx]);
  const mc=document.getElementById('mainContent');
  if(mc) mc.innerHTML=renderUserMgmt();
};

window.editCalcAge=function(){
  const dob=document.getElementById('edit_dob')?.value;
  const ageEl=document.getElementById('edit_age');
  if(!dob||!ageEl) return;
  const today=new Date();
  const birth=new Date(dob);
  let age=today.getFullYear()-birth.getFullYear();
  const mo=today.getMonth()-birth.getMonth();
  if(mo<0||(mo===0&&today.getDate()<birth.getDate())) age--;
  ageEl.value=age>0?age:'';
};

window.closeEditModal=function(){
  document.getElementById('editLoanModal').style.display = 'none';
  document.body.style.overflow = '';
};

window.saveEditLoan=function(){
  const id = +document.getElementById('editLoanId').value;
  const loans = DB_get('loans')||[];
  const idx = loans.findIndex(x=>x.id===id);
  if(idx<0) return;
  const l = loans[idx];

  // 验证必填项
  const customer = document.getElementById('edit_customer').value.trim();
  if(!customer){ document.getElementById('editLoanMsg').innerHTML='<div style="color:red;font-size:13px;margin-bottom:8px">⚠️ 客户姓名不能为空</div>'; return; }

  const newMonthlyInterest = +(document.getElementById('edit_monthlyInterest').value)||l.monthlyInterest;
  const newLoanAmount = +(document.getElementById('edit_loanAmount').value)||l.loanAmount;
  const newMonthlyPrincipal = l.periods>0 ? newLoanAmount/l.periods : (l.monthlyPrincipal||0);

  // 更新字段
  loans[idx] = {
    ...l,
    contractNo: document.getElementById('edit_contractNo').value.trim(),
    date: document.getElementById('edit_date').value||l.date,
    customer,
    customerPhone: document.getElementById('edit_customerPhone').value.trim(),
    idNumber: document.getElementById('edit_idNumber').value.trim(),
    customerDob: document.getElementById('edit_dob').value||'',
    customerAge: +(document.getElementById('edit_age').value||0)||null,
    shopName: document.getElementById('edit_shopName').value.trim(),
    salesperson: document.getElementById('edit_salesperson').value.trim(),
    phoneBrand: document.getElementById('edit_phoneBrand').value.trim(),
    phoneModel: document.getElementById('edit_phoneModel').value.trim(),
    phoneImei: document.getElementById('edit_phoneImei').value.trim(),
    phoneNote: document.getElementById('edit_phoneNote').value.trim(),
    loanAmount: newLoanAmount,
    actualAmount: +(document.getElementById('edit_actualAmount').value)||l.actualAmount||0,
    monthlyInterest: newMonthlyInterest,
    monthlyPrincipal: newMonthlyPrincipal,
    firstDue: document.getElementById('edit_firstDue').value||l.firstDue,
    note: document.getElementById('edit_note').value.trim(),
  };

  // 如果月利息或贷款金额改变，更新未还款期数的金额
  if(newMonthlyInterest !== l.monthlyInterest || newLoanAmount !== l.loanAmount){
    loans[idx].schedule = loans[idx].schedule.map(p=>{
      if(!p.paid){
        return {...p, paidInterest:0, paidPrincipal:0};
      }
      return p;
    });
  }

  // 如果首次还款日改变了，重新计算未还款期数的还款日期
  const newFirstDue = document.getElementById('edit_firstDue').value||l.firstDue;
  if(newFirstDue && newFirstDue !== l.firstDue) {
    const schedule = loans[idx].schedule;
    // 找出第一个未还款的期数（从1开始重排日期）
    let baseDate = new Date(newFirstDue);
    let firstUnpaidPeriod = null;
    for(let i=0; i<schedule.length; i++){
      if(!schedule[i].paid){
        firstUnpaidPeriod = schedule[i].period;
        break;
      }
    }
    if(firstUnpaidPeriod !== null){
      for(let i=0; i<schedule.length; i++){
        if(!schedule[i].paid){
          // 计算该期相对于firstDue的偏移月数
          const offset = schedule[i].period - firstUnpaidPeriod;
          const d = new Date(newFirstDue);
          d.setMonth(d.getMonth() + offset);
          schedule[i].dueDate = d.toISOString().slice(0,10);
        }
      }
      loans[idx].schedule = schedule;
    }
  }

  DB_set('loans', loans);
  saveRecord('loans', loans[idx]);
  closeEditModal();

  // 刷新列表
  const q=(document.getElementById('lSearch')?.value||'').toLowerCase();
  const st=document.getElementById('lStatusFilter')?.value||'';
  let list=DB_get('loans')||[];
  if(q) list=list.filter(l=>l.customer.toLowerCase().includes(q)||String(l.id).includes(q)||(l.phoneModel||'').toLowerCase().includes(q)||(l.phoneImei||'').includes(q));
  if(st) list=list.filter(l=>l.status===st);
  const wrap=document.getElementById('loanTableWrap');
  if(wrap) wrap.innerHTML=buildLoanTable(list.slice().reverse());
};

window.deleteLoan=function(id){
  const loans=DB_get('loans')||[];
  const l=loans.find(x=>x.id===id); if(!l) return;
  const pwd = prompt(_lang==='zh'?'请输入删除密码：':_lang==='en'?'Enter delete password:':'បញ្ចូលពាក្យសម្ងាត់:');
  if(pwd===null) return;
  if(pwd!=='guo'){ alert(_lang==='zh'?'密码错误，无法删除！':_lang==='en'?'Wrong password!':'ពាក្យសម្ងាត់មិនត្រូវ!'); return; }
  if(!confirm(`${t('deleteBtn')} #${id} — ${l.customer}?`)) return;
  DB_set('loans',loans.filter(x=>x.id!==id));
  // 同步删除服务器记录
  fetch('/api/delete-record',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({table:'loans',id})});
  filterLoans();
};

window.filterPawnLoans=function(){
  const kw=(document.getElementById('pLoanSearch')?.value||'').trim().toLowerCase();
  const loans=(DB_get('loans')||[]).filter(l=>l.status===_lang==='km'?'កំពុងដំណើរ':_lang==='en'?'Active':'进行中');
  const sel=document.getElementById('pLoan');
  const hint=document.getElementById('pLoanHint');
  const countEl=document.getElementById('pLoanSearchCount');
  if(!sel) return;
  // 过滤匹配的合同
  const matched=kw
    ? loans.filter(l=>{
        const id=String(l.id||'');
        const name=(l.customer||'').toLowerCase();
        const ic=(l.idNumber||l.ic||l.idCard||'').toLowerCase();
        const phone=(l.phone||l.customerPhone||'').toLowerCase();
        const imei=(l.imei||l.serialNo||l.serial||l.phoneSerial||'').toLowerCase();
        const model=(l.phoneModel||'').toLowerCase();
        return id.includes(kw)||name.includes(kw)||ic.includes(kw)||phone.includes(kw)||imei.includes(kw)||model.includes(kw);
      })
    : loans;
  // 重新渲染下拉选项
  sel.innerHTML=matched.length
    ? matched.map(l=>`<option value="${l.id}">#${l.id} — ${esc(l.customer)} (${esc(l.phoneModel)} · ${fmt(l.loanAmount)})</option>`).join('')
    : `<option value="">— ${kw?'无匹配合同':'暂无进行中合同'} —</option>`;
  // 更新提示
  if(countEl) countEl.textContent=kw?`${matched.length}/${loans.length}`:'';
  if(hint){
    if(kw && matched.length===0) hint.textContent='⚠️ 未找到匹配合同，请检查关键字';
    else if(kw && matched.length>0) hint.textContent=`✅ 找到 ${matched.length} 份合同，请在下方选择`;
    else hint.textContent=`共 ${loans.length} 份进行中合同，请输入关键字快速筛选后再选择`;
  }
  // 自动触发加载期次
  if(matched.length>0) loadLoanPeriods();
};

window.loadLoanPeriods=function(){

window.autoFillPayment=function(){
  const id=+(document.getElementById('pLoan')?.value||0);
  const period=+(document.getElementById('pPeriod')?.value||0);
  const l=(DB_get('loans')||[]).find(x=>x.id===id);
  const p=l?.schedule.find(x=>x.period===period);
  if(p){
    const pi=document.getElementById('pPrincipal'), ii=document.getElementById('pInterest');
    if(pi) pi.value=p.principalDue.toFixed(2);
    if(ii) ii.value=p.interestDue.toFixed(2);
    calcPayTotal();

};

window.submitPayment=async function(){
  if(_currentUser&&_currentUser.role==='readonly'){alert('无权限：只读账户不能操作还款');return;}
  if(isSpecialist()&&!canAccessCollection()){alert('无权限：您没有收款操作权限');return;}
  if(isSpecialist()&&!canAccessCollection()){alert('无权限：您没有收款操作权限');return;}
  const loanId=+(document.getElementById('pLoan')?.value||0);
  if(!loanId){showMsg('payMsg',t('msgSelectLoan'),'red');return;}
  const periodNo=+(document.getElementById('pPeriod')?.value||0);
  const pDate=document.getElementById('pDate')?.value||today();
  const principal=+(document.getElementById('pPrincipal')?.value||0);
  const interest=+(document.getElementById('pInterest')?.value||0);
  const penalty=+(document.getElementById('pPenalty')?.value||0);
  if(!principal&&!interest){showMsg('payMsg',t('msgFillAmount'),'red');return;}
  const loans=DB_get('loans')||[];
  const li=loans.findIndex(l=>l.id===loanId); if(li<0) return;
  const l=loans[li];
  const pi=l.schedule.findIndex(p=>p.period===periodNo); if(pi<0) return;
  if(l.schedule[pi].paid){showMsg('payMsg',t('msgPeriodPaid'),'amber');return;}
  l.schedule[pi]={...l.schedule[pi],paid:true,paidDate:pDate,paidPrincipal:principal,paidInterest:interest,penalty};
  if(l.schedule.every(p=>p.paid)) l.status='已结清';
  loans[li]=l; DB_set('loans',loans);
  const pays=DB_get('payments')||[];
  const payId=await getNextId('payments');
  pays.push({id:payId,loanId,customer:l.customer,period:periodNo,date:pDate,paidPrincipal:principal,paidInterest:interest,penalty});
  DB_set('payments',pays);
  showMsg('payMsg',_lang==='km'?'⏳ កំពុងរក្សាទុក...':_lang==='en'?'⏳ Saving...':'⏳ 正在保存收款记录...','');
  // 单条保存，不覆盖其他人数据
  const pay = pays[pays.length-1];
  const [lOk, pOk] = await Promise.all([
    saveRecord('loans', l),
    saveRecord('payments', pay)
  ]);
  if(lOk && pOk){
    showMsg('payMsg',`✅ 收款成功！#${loanId} ${l.customer} — ${t('period')} ${periodNo} · ${fmt(principal+interest+penalty)}`,'green');
  } else {
    showMsg('payMsg','❌ 保存失败！请重试','red');
  }
  document.getElementById('pPenalty').value='0';
  document.getElementById('pTotal').value='';
  loadLoanPeriods(); updateBadges();
  const wrap=document.getElementById('payTableWrap');
  if(wrap) wrap.innerHTML=buildPayTable((DB_get('payments')||[]).slice().reverse());
};
function buildPayTable(pays){
  if(!pays.length) return `<div class="empty-state"><div class="ei">💰</div><p>${t('noRecord')}</p></div>`;
  return `<div class="table-wrap"><table>
    <tr><th>${t('colDate')}</th><th>${t('colCustomer')}</th><th>#</th><th>${t('period')}</th>
      <th>${t('paidInterest')}</th><th>${t('paidPrincipal')}</th><th>${t('penalty')}</th><th>${t('totalPayment')}</th>
      <th>${t('colAction')}</th></tr>
    ${pays.map(p=>`<tr>
      <td>${p.date}</td>
      <td class="fw700">${esc(p.customer)}</td>
      <td class="text-blue">#${p.loanId}</td>
      <td>${p.period}</td>
      <td class="text-sky fw700">${fmt(p.paidInterest)}</td>
      <td>${fmt(p.paidPrincipal)}</td>
      <td>${p.penalty>0?`<span class="text-red">${fmt(p.penalty)}</span>`:'—'}</td>
      <td class="fw700 text-green">${fmt((+p.paidPrincipal)+(+p.paidInterest)+(+p.penalty||0))}</td>
      <td><button class="btn btn-danger btn-sm" onclick="deletePayment(${p.id})">${t('deleteBtn')}</button></td>
    </tr>`).join('')}
  </table></div>`;
}
window.deletePayment=async function(id){
  const pays=DB_get('payments')||[];
  const pay=pays.find(p=>p.id===id); if(!pay) return;
  if(!confirm(`${t('deleteBtn')} — ${pay.customer} ${t('period')} ${pay.period}?`)) return;
  const newPays=pays.filter(p=>p.id!==id);
  DB_set('payments',newPays);
  // 服务器删除收款记录
  await fetch('/api/delete-record',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({table:'payments',id})});
  const loans=DB_get('loans')||[];
  const li=loans.findIndex(l=>l.id===pay.loanId);
  if(li>=0){
    const pi=loans[li].schedule.findIndex(p=>p.period===pay.period);
    if(pi>=0){
      loans[li].schedule[pi]={...loans[li].schedule[pi],paid:false,paidDate:null,paidPrincipal:0,paidInterest:0,penalty:0};
      if(loans[li].status==='已结清') loans[li].status='进行中';
      DB_set('loans',loans);
      // 同步更新合同到服务器
      await saveRecord('loans',loans[li]);
    }
  }
  const wrap=document.getElementById('payTableWrap');
  if(wrap) wrap.innerHTML=buildPayTable((DB_get('payments')||[]).slice().reverse());
  showMsg('payMsg','✅ '+t('saved'),'green');
};

window.filterExtLoan=function(){
  const q=(document.getElementById('extSearch')?.value||'').toLowerCase();
  const minPaid={2:1,3:1,4:2,5:3,6:3};
  const allLoans=(DB_get('loans')||[]).filter(l=>l.status===_lang==='km'?'កំពុងដំណើរ':_lang==='en'?'Active':'进行中');
  const filtered=q?allLoans.filter(l=>
    (l.customer||'').toLowerCase().includes(q)||
    String(l.id).includes(q)||
    (l.phoneModel||'').toLowerCase().includes(q)
  ):allLoans;
  const select=document.getElementById('extLoan');
  if(!select) return;
  select.innerHTML=filtered.map(l=>{
    const total=l.periods||l.schedule.length||0;
    const paid=l.schedule.filter(p=>p.paid).length;
    const req=minPaid[total]||(total>6?Math.ceil(total/2):1);
    const ok=paid>=req;
    const tag=ok?`✅ 可续期(已还${paid}/${total}期)`:`❌ 需还${req}期(已还${paid}/${total}期)`;
    return `<option value="${l.id}" ${ok?'':'style="color:#aaa"'}>#${l.id} — ${esc(l.customer)} · ${tag}</option>`;
  }).join('')||(q?`<option>无匹配结果</option>`:`<option>${t('noRecord')}</option>`);
};

window.calcExtension=function(){
  const id=+(document.getElementById('extLoan')?.value||0);
  const l=(DB_get('loans')||[]).find(x=>x.id===id); if(!l) return;
  const remainP=l.loanAmount-l.schedule.filter(p=>p.paid).reduce((a,p)=>a+(+p.paidPrincipal||0),0);
  const newAmt=+(document.getElementById('extNewAmount')?.value||0);
  const baseAmt=newAmt>0?newAmt:remainP;
  const extPeriods=+(document.getElementById('extPeriods')?.value||1);
  const mInt=parseFloat((baseAmt*(l.monthlyRate/100)).toFixed(2));
  const mP=parseFloat((baseAmt/extPeriods).toFixed(2));
  const el=document.getElementById('extMonthlyInt');
  if(el) el.value=mInt.toFixed(2);
  // 计算还款日总额（每月利息+每月本金）
  const total=mInt+mP;
  const tot=document.getElementById('extDayTotal');
  if(tot) tot.value=fmt(total);
};

window.submitExtension=async function(){
  if(_currentUser&&_currentUser.role==='readonly'){alert('无权限：只读账户不能操作续期');return;}
  if(isSpecialist()&&!canAccessCollection()){alert('无权限：您没有续期操作权限');return;}
  if(isSpecialist()&&!canAccessCollection()){alert('无权限：您没有续期操作权限');return;}
  const id=+(document.getElementById('extLoan')?.value||0);
  if(!id){showMsg('extMsg',t('msgSelectLoan'),'red');return;}
  const loans=DB_get('loans')||[];
  const li=loans.findIndex(l=>l.id===id); if(li<0) return;
  const l=loans[li];

  // ── 限制1：还款期数检查 ──
  const totalPeriods=l.periods||l.schedule.length||0;
  const paidPeriods=l.schedule.filter(p=>p.paid).length;
  const minPaid={2:1,3:1,4:2,5:3,6:3};
  const required=minPaid[totalPeriods]||(totalPeriods>6?Math.ceil(totalPeriods/2):1);
  if(paidPeriods<required){
    showMsg('extMsg',`❌ 不满足续期条件！${totalPeriods}期贷款需还清 ${required} 期，当前已还 ${paidPeriods} 期`,'red');
    return;
  }

  // ── 限制2：同名客户不能同时在进行中 ──
  const custName=(l.customer||'').trim().toLowerCase();
  const dupLoan=loans.find(x=>x.id!==id && x.status===_lang==='km'?'កំពុងដំណើរ':_lang==='en'?'Active':'进行中' && (x.customer||'').trim().toLowerCase()===custName);
  if(dupLoan){
    showMsg('extMsg',`❌ 客户 "${l.customer}" 已有进行中的合同 #${dupLoan.id}，不能同时续期！`,'red');
    return;
  }
  const extPeriods=+(document.getElementById('extPeriods')?.value||1);
  const extDate=document.getElementById('extDate')?.value||today();
  const remainP=l.loanAmount-l.schedule.filter(p=>p.paid).reduce((a,p)=>a+(+p.paidPrincipal||0),0);
  const newAmt=+(document.getElementById('extNewAmount')?.value||0);
  const baseAmt=newAmt>0?newAmt:remainP;
  const mInt=parseFloat((+(document.getElementById('extMonthlyInt')?.value||0)).toFixed(2));
  const mP=parseFloat((baseAmt/extPeriods).toFixed(2));
  const extFee=0;
  // Get last due date
  const lastPaid=l.schedule.filter(p=>p.paid);
  let startDate=lastPaid.length>0?new Date(lastPaid[lastPaid.length-1].dueDate):new Date();
  startDate.setMonth(startDate.getMonth()+1);
  // Add new periods to schedule
  const maxPeriod=l.schedule.length;
  for(let i=0;i<extPeriods;i++){
    l.schedule.push({
      period:maxPeriod+i+1,
      dueDate:startDate.toISOString().slice(0,10),
      principalDue:mP,interestDue:mInt,
      paid:false,paidDate:null,paidPrincipal:0,paidInterest:0,penalty:0
    });
    startDate=new Date(startDate); startDate.setMonth(startDate.getMonth()+1);
  }
  l.periods+=extPeriods;
  l.status='进行中';
  if(!l.extensions) l.extensions=[];
  l.extensions.push({date:extDate,extPeriods,extFee,remainPrincipal:remainP,newMonthlyInterest:mInt});
  loans[li]=l; DB_set('loans',loans);
  const exts=DB_get('extensions')||[];
  const extId=await getNextId('extensions');
  exts.push({id:extId,loanId:id,customer:l.customer,date:extDate,extPeriods,extFee,remainPrincipal:remainP,newMonthlyInterest:mInt});
  DB_set('extensions',exts);
  showMsg('extMsg','⏳ 正在保存续期记录...','');
  const extRecord = exts[exts.length-1];
  const [lExtOk, eOk] = await Promise.all([
    saveRecord('loans', l),
    saveRecord('extensions', extRecord)
  ]);
  if(lExtOk && eOk){
    showMsg('extMsg',`✅ 续期成功！#${id} ${l.customer} — +${extPeriods} ${t('period')}`,'green');
    setTimeout(()=>nav('extension'),1500);
  } else {
    showMsg('extMsg','❌ 保存失败！请重试','red');
  }
};

function renderBadDebt(){
  const loans=DB_get('loans')||[];
  const td=today();
  const tab=window._badDebtTab||'age';

  // 逾期天数计算
  function getOverdueDays(l){
    if(l.status===_lang==='km'?'បានបិទ':_lang==='en'?'Settled':'已结清') return 0;
    let maxDays=0;
    (l.schedule||[]).forEach(p=>{
      if(!p.paid&&p.dueDate<td){
        const d=daysDiff(p.dueDate,td);
        if(d>maxDays) maxDays=d;
      }
    });
    return maxDays;
  }

  function getOverdueLevel(days){
    if(days===0) return null;
    if(days<=30) return {label:'关注',color:'#f9a825',bg:'#fff8e1'};
    if(days<=60) return {label:'次级',color:'#ef6c00',bg:'#fff3e0'};
    if(days<=90) return {label:'可疑',color:'#c62828',bg:'#ffebee'};
    return {label:'坏账',color:'#7b1fa2',bg:'#f3e5f5'};
  }

  // 所有逾期贷款
  const overdueLoans=loans.filter(l=>l.status===_lang==='km'?'កំពុងដំណើរ':_lang==='en'?'Active':'进行中'&&getOverdueDays(l)>0);
  const total=overdueLoans.length;
  const totalAmt=overdueLoans.reduce((a,l)=>a+(+l.loanAmount||0),0);

  // 各阶段统计
  const levels={关注:0,次级:0,可疑:0,坏账:0};
  const levelAmt={关注:0,次级:0,可疑:0,坏账:0};
  overdueLoans.forEach(l=>{
    const lv=getOverdueLevel(getOverdueDays(l));
    if(lv){levels[lv.label]++;levelAmt[lv.label]+=(+l.loanAmount||0);}
  });

  const levelColors={关注:'#f9a825',次级:'#ef6c00',可疑:'#c62828',坏账:'#7b1fa2'};

  // ── 年龄段分析 ──
  function renderAge(){
    const groups={'18-25':{cnt:0,amt:0},'26-35':{cnt:0,amt:0},'36-45':{cnt:0,amt:0},'46+':{cnt:0,amt:0},'未知':{cnt:0,amt:0}};
    overdueLoans.forEach(l=>{
      const age=+l.customerAge||0;
      const g=age>=18&&age<=25?'18-25':age>=26&&age<=35?'26-35':age>=36&&age<=45?'36-45':age>=46?'46+':'未知';
      groups[g].cnt++; groups[g].amt+=(+l.loanAmount||0);
    });
    return `<div class="table-wrap"><table>
      <tr><th>年龄段</th><th>逾期笔数</th><th>逾期金额</th><th>占比</th><th>风险等级</th></tr>
      ${Object.entries(groups).map(([g,v])=>{
        const pct=total>0?((v.cnt/total)*100).toFixed(1):0;
        const risk=v.cnt===0?'—':+pct>=30?'🔴 高风险':+pct>=15?'🟡 中风险':'🟢 低风险';
        return `<tr>
          <td class="fw700">${g}岁</td>
          <td class="fw700 text-red">${v.cnt}</td>
          <td class="fw700 text-amber">${fmt(v.amt)}</td>
          <td><div style="display:flex;align-items:center;gap:6px">
            <div style="background:#eee;border-radius:4px;height:8px;width:80px;overflow:hidden">
              <div style="background:#c62828;height:100%;width:${pct}%"></div>
            </div>${pct}%</div></td>
          <td>${risk}</td>
        </tr>`;
      }).join('')}
    </table></div>
    <div class="alert" style="background:#fff8e1;border-left:4px solid #f9a825;margin-top:10px;font-size:12px">
      ⚠️ 提示：若客户年龄未录入，会归入"未知"分组。建议在录单时填写客户年龄以获得准确分析。
    </div>`;
  }

  // ── 借款金额区间分析 ──
  function renderAmount(){
    const groups={'<$100':{cnt:0,amt:0},'$100-300':{cnt:0,amt:0},'$300-500':{cnt:0,amt:0},'$500+':{cnt:0,amt:0}};
    overdueLoans.forEach(l=>{
      const a=+l.loanAmount||0;
      const g=a<100?'<$100':a<=300?'$100-300':a<=500?'$300-500':'$500+';
      groups[g].cnt++; groups[g].amt+=a;
    });
    return `<div class="table-wrap"><table>
      <tr><th>借款金额</th><th>逾期笔数</th><th>逾期金额</th><th>占比</th><th>风险等级</th></tr>
      ${Object.entries(groups).map(([g,v])=>{
        const pct=total>0?((v.cnt/total)*100).toFixed(1):0;
        const risk=v.cnt===0?'—':+pct>=30?'🔴 高风险':+pct>=15?'🟡 中风险':'🟢 低风险';
        return `<tr>
          <td class="fw700">${g}</td>
          <td class="fw700 text-red">${v.cnt}</td>
          <td class="fw700 text-amber">${fmt(v.amt)}</td>
          <td><div style="display:flex;align-items:center;gap:6px">
            <div style="background:#eee;border-radius:4px;height:8px;width:80px;overflow:hidden">
              <div style="background:#c62828;height:100%;width:${pct}%"></div>
            </div>${pct}%</div></td>
          <td>${risk}</td>
        </tr>`;
      }).join('')}
    </table></div>`;
  }

  // ── 机型分析 ──
  function renderModel(){
    const modelMap={};
    overdueLoans.forEach(l=>{
      const brand=(l.phoneBrand||t('apptSrcOther')).trim();
      const key=brand==='Apple'||brand.toLowerCase().includes('iphone')?'Apple iPhone':
                brand==='Samsung'||brand.toLowerCase().includes('samsung')?'Samsung':
                brand==='Oppo'||brand.toLowerCase().includes('oppo')?'Oppo':
                brand==='Vivo'||brand.toLowerCase().includes('vivo')?'Vivo':
                brand==='Xiaomi'||brand.toLowerCase().includes('xiaomi')?'Xiaomi':t('apptSrcOther');
      if(!modelMap[key]) modelMap[key]={cnt:0,amt:0};
      modelMap[key].cnt++; modelMap[key].amt+=(+l.loanAmount||0);
    });
    const sorted=Object.entries(modelMap).sort((a,b)=>b[1].cnt-a[1].cnt);
    return `<div class="table-wrap"><table>
      <tr><th>手机品牌</th><th>逾期笔数</th><th>逾期金额</th><th>占比</th><th>风险等级</th></tr>
      ${sorted.map(([g,v])=>{
        const pct=total>0?((v.cnt/total)*100).toFixed(1):0;
        const risk=v.cnt===0?'—':+pct>=30?'🔴 高风险':+pct>=15?'🟡 中风险':'🟢 低风险';
        return `<tr>
          <td class="fw700">${g}</td>
          <td class="fw700 text-red">${v.cnt}</td>
          <td class="fw700 text-amber">${fmt(v.amt)}</td>
          <td><div style="display:flex;align-items:center;gap:6px">
            <div style="background:#eee;border-radius:4px;height:8px;width:80px;overflow:hidden">
              <div style="background:#c62828;height:100%;width:${pct}%"></div>
            </div>${pct}%</div></td>
          <td>${risk}</td>
        </tr>`;
      }).join('')}
    </table></div>`;
  }

  // ── 逾期明细 ──
  function renderDetail(){
    if(!overdueLoans.length) return `<div class="empty-state"><div class="ei">✅</div><p>暂无逾期贷款</p></div>`;
    return `<div class="table-wrap"><table>
      <tr><th>#</th><th>客户</th><th>手机型号</th><th>贷款额</th><th>逾期天数</th><th>逾期阶段</th></tr>
      ${overdueLoans.slice().sort((a,b)=>getOverdueDays(b)-getOverdueDays(a)).map(l=>{
        const days=getOverdueDays(l);
        const lv=getOverdueLevel(days);
        return `<tr>
          <td><a href="#" onclick="viewLoan(${l.id});return false" class="text-blue fw700">#${l.id}</a></td>
          <td class="fw700">${esc(l.customer)}<div style="font-size:11px;color:var(--muted)">${esc(l.customerPhone||'')}</div></td>
          <td style="font-size:12px">${esc(l.phoneModel||'—')}</td>
          <td class="fw700 text-amber">${fmt(l.loanAmount)}</td>
          <td class="fw700 text-red">${days}天</td>
          <td><span style="background:${lv?.bg};color:${lv?.color};border:1px solid ${lv?.color}44;padding:2px 10px;border-radius:12px;font-size:11px;font-weight:700">${lv?.label}</span></td>
        </tr>`;
      }).join('')}
    </table></div>`;
  }

  return `
  <div class="page-header"><div class="page-title">⚠️ 坏账分析</div></div>

  <div class="stats-grid">
    <div class="stat-card red"><span class="stat-icon">⚠️</span><div class="stat-label">逾期总笔数</div><div class="stat-value">${total}</div><div class="stat-sub">进行中贷款</div></div>
    <div class="stat-card red"><span class="stat-icon">💸</span><div class="stat-label">逾期总金额</div><div class="stat-value">${fmt(totalAmt)}</div></div>
    <div class="stat-card amber"><span class="stat-icon">📊</span><div class="stat-label">逾期率</div><div class="stat-value">${loans.filter(l=>l.status===_lang==='km'?'កំពុងដំណើរ':_lang==='en'?'Active':'进行中').length>0?((total/loans.filter(l=>l.status===_lang==='km'?'កំពុងដំណើរ':_lang==='en'?'Active':'进行中').length)*100).toFixed(1):0}%</div><div class="stat-sub">占进行中贷款</div></div>
    <div class="stat-card purple"><span class="stat-icon">🚨</span><div class="stat-label">坏账金额</div><div class="stat-value">${fmt(levelAmt['坏账'])}</div><div class="stat-sub">逾期90天以上</div></div>
  </div>

  <div class="card" style="margin-bottom:14px">
    <div class="card-title" style="margin-bottom:12px">📊 逾期阶段分布</div>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px">
      ${['关注','次级','可疑','坏账'].map(lv=>`
        <div style="background:${lv==='关注'?'#fff8e1':lv==='次级'?'#fff3e0':lv==='可疑'?'#ffebee':'#f3e5f5'};border-radius:10px;padding:12px;text-align:center;border-left:3px solid ${levelColors[lv]}">
          <div style="font-size:11px;color:${levelColors[lv]};font-weight:700">${lv} (${lv==='关注'?'1-30天':lv==='次级'?'31-60天':lv==='可疑'?'61-90天':'90天+'})</div>
          <div style="font-size:22px;font-weight:700;color:${levelColors[lv]};margin:6px 0">${levels[lv]}</div>
          <div style="font-size:12px;color:${levelColors[lv]}">${fmt(levelAmt[lv])}</div>
        </div>`).join('')}
    </div>
  </div>

  <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap">
    <button onclick="window._badDebtTab='age';nav('bad-debt')" style="padding:8px 18px;border:none;border-radius:20px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;background:${tab==='age'?'#c62828':'#e0e0e0'};color:${tab==='age'?'#fff':'var(--text)'}">👤 年龄段分析</button>
    <button onclick="window._badDebtTab='amount';nav('bad-debt')" style="padding:8px 18px;border:none;border-radius:20px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;background:${tab==='amount'?'#c62828':'#e0e0e0'};color:${tab==='amount'?'#fff':'var(--text)'}">💰 借款金额分析</button>
    <button onclick="window._badDebtTab='model';nav('bad-debt')" style="padding:8px 18px;border:none;border-radius:20px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;background:${tab==='model'?'#c62828':'#e0e0e0'};color:${tab==='model'?'#fff':'var(--text)'}">📱 机型分析</button>
    <button onclick="window._badDebtTab='detail';nav('bad-debt')" style="padding:8px 18px;border:none;border-radius:20px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;background:${tab==='detail'?'#c62828':'#e0e0e0'};color:${tab==='detail'?'#fff':'var(--text)'}">📋 逾期明细</button>
